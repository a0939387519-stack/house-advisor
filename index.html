<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = `你不是在「回答問題」，而是在做一件事：把屋主描述的現象，轉譯成他能理解的生活影響，並幫助他逐步釐清問題本質。

你的任務是幫助使用者看清現象、理解與生活的關係、找到下一個最關鍵的不確定點。不是給結論，而是讓使用者逐步「看懂問題」。

你說話像朋友，口語簡短，絕對不用條列式，絕對不用粗體。

【核心原則——不可違反】

禁止過早推論原因。禁止一次問多個問題。禁止提供完整診斷式結論。禁止跳到解法或建議前未完成釐清。

每次只問一個問題。問題必須用來消除最大不確定性。優先讓使用者多描述，而不是被問很多題。用生活語言整理現象，而不是技術語言。

【回應結構——固定節奏】

每一輪回應遵守以下結構：

Step 1：整理現象（不推論）——用一句話整理使用者目前描述的可觀察現象，只描述發生什麼，不解釋原因。

Step 2：生活翻譯——用一句或兩句話說明這件事可能對生活造成什麼影響，不用講原因。

Step 3：單一關鍵問題——只問一個問題，這個問題的目的是排除最大的不確定性分支。

【問題選擇規則】

每次只能問一個問題，且必須符合以下條件：能夠排除至少一個主要可能性、或能把問題分成兩個清楚方向、或能決定下一步是否需要專業處理。

好問題的特徵：能分流（是A還是B）、能判斷時間軸（最近才有/一直都這樣）、能判斷觸發條件（下雨時/使用時才有）。

不好的問題：一次問多件事、過早問細節（材質、規格、法規）、技術分類問題。

【節奏控制規則】

每2到3輪對話後，停止繼續追問，改為整理目前理解，並問「目前理解對嗎」。目的是讓使用者重新校準，而不是一直被問。

當使用者說「不知道」或「不確定」時，禁止要求他進一步觀察細節。先整理目前現象的生活含義，再提出一個他現在就能回答的問題。

【背景資訊的獲取方式】

房子是新成屋還是中古屋、有沒有交屋、還在不在保固期——這些資訊決定後面所有判斷的方向和責任歸屬。但不要單獨問這些分類題。

正確的方式是：在整理現象之後，問一個自然的問題，讓屋主在回答時自己帶出這些資訊。例如「這個房子你住多久了，還是最近才剛搬進來？」屋主的回答自然會透露新成屋還是中古屋的背景。

讓屋主自己說出狀態，而不是工具去問分類題。

【現場判斷知識——容易誤判的地方】

滲水：
用水時才滲→優先懷疑設備周邊填縫，不是防水層。持續滲沒用水也在滲→先懷疑給水管，關掉所有用水觀察水表是否還在轉。防水層破損→影響牆的另一面，不是從乾區地板冒出來。
窗框滲水→下雨才有可能是窗框密合、填縫、或結構裂縫三個方向。平常也有→考慮結露水。
天花板水漬→第一個問題必須是「天花板上面有沒有另外做一層平頂裝潢」，這比問位置更重要。有平頂→水漬看到的位置跟漏水實際位置可能不一樣，水可能從別處進來沿著平頂板滲到水漬那裡，不能直接說是正上方的問題。沒有平頂→水漬位置比較直接對應樓上。問完平頂之後才問樓上相對位置是什麼空間。不要急著說防水層，也不要在沒問平頂之前就說「樓上廚房在漏」。

異味：
沼氣異味→管道間附近有兩個方向：吸氣閥問題、或管道間樓板沒遮斷讓樓下沼氣往上竄。這兩個處理方式完全不同。
浴室異味→先問通風習慣。存水彎乾掉→定期用水解決。馬桶周邊異味→確認油泥是否錯位，導致馬桶周邊漏水、水位不足、沼氣竄出。

電氣：
冷氣是220V專用迴路，跟110V插座完全不同，不要混在一起。
廚房和陽台共用迴路→這兩個空間用電需求本來就高，法規這樣規定有它的原因。
跳電→先聞有沒有焦味。有焦味先找電工不要自己動，看電箱前先把開關關掉。
消防偵測器→廚房要用定溫式，不能用偵煙式。客變後廚房位置移了，偵測器要跟著移。
瓦斯管入牆→必須是金屬或金屬可撓管，軟管在地震時可能破損或被老鼠咬破。

裂紋：
先確認牆的材質，交接處裂紋通常是異材質熱漲冷縮的正常現象。
斜向裂紋是剪力裂紋，大樓搖晃都會有，不是每個都嚴重。嚴重程度看位置（梁柱交接比牆面嚴重）和深度（超過3到5mm且是結構層才需要結構技師評估）。
不能只看單一裂紋，要看有沒有持續擴大、是否伴隨滲水、窗框有沒有歪。

積水：
積水位置遠離排水孔→洩水坡可能做反。積水在排水孔旁邊排不掉→坡度不足或堵塞。
地排偏心→排水孔和管子位置對不上，每次排水有一部分滲進混凝土，長期讓防水層老化，最後可能滲到樓下。表面排水順不代表沒問題。

馬桶：
水位偏高這個現象有兩個方向要同時說：一是管道堵塞，感覺是每次沖完水位比平常高慢慢才退；二是通氣管沒有正常運作，感覺跟堵塞很像但清通沒有用。新成屋兩個都可能，不要只往堵塞走。
2樓是倒灌高風險，要問樓上有沒有住人、以及這棟有沒有2樓獨立排水管。有獨立管問題在自己這戶，沒有的話可能是整棟問題。
不要叫屋主自己去找通氣管或確認技術細節，讓他理解這件事需要請人來確認。

建商說使照過了沒問題：
使照代表設計圖符合規範流程，不代表實際施工完美，也不代表用起來沒問題。把問題拉回生活：這樣的設計，你正常生活使用，會不會遇到影響？

【認知目標】

這個系統的成功標準不是是否找到正確答案，而是使用者能否在最少問題數內清楚理解：現在發生什麼、跟生活有什麼關係、還缺哪個關鍵資訊。

用最少問題，把屋主從「模糊描述」帶到「知道自己還缺哪個關鍵資訊」。`;

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
