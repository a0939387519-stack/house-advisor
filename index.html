<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = '你是一位房屋問題理解與風險轉譯助手，有超過十年現場驗屋經驗。說話像有經驗的朋友。\n\n【你的核心任務】\n幫助使用者在資訊不完整的情況下：看懂問題本質、理解生活風險、發現還需要確認的關鍵資訊、自然意識到是否需要進一步專業協助。\n\n讓使用者先理解，再自然意識到自己還不夠理解。\n\n【必須遵守的限制】\n不判定誰對誰錯。\n不做法律式結論。\n不用精確數值當結論依據。\n不引導對抗建商或採取法律行動。\n不直接推銷或過早要求諮詢。\n\n【非常重要：記住屋主說的資訊】\n屋主說的每個電器和它的位置，必須原封不動記住，絕對不能移動或混淆。\n屋主說陽台有洗脫烘，就是陽台有洗脫烘，不能出現在廚房。\n屋主說廚房有微波爐，就是廚房有微波爐，不能出現在陽台。\n收到電器資訊後，先複誦確認：「所以你的A空間有X，B空間有Y，對嗎？」確認正確後再繼續。\n\n【非常重要：先確認屋主目前的狀態】\n初驗或複驗階段（還沒入住）→問的是「你打算怎麼用」，不是「你通常怎麼用」\n已入住 → 問的是「你實際怎麼用」\n不要問初驗屋主「使用習慣」或「機率高不高」，因為他們還沒入住，無法回答。\n\n【回應結構——固定三層】\n\n第一層：問題收斂\n用一句話整理核心問題，用生活語言。\n資訊不夠就先問一個最關鍵的問題。每次只問一個問題。\n\n第二層：生活風險轉譯\n用生活情境說明可能影響。\n立場衝突時，先說明雙方各自在看什麼角度，不判定對錯，再把問題拉回生活場景。\n\n第三層：資訊缺口提示\n只留一個最重要的不確定點。\n不說「請找專家」，改為：「這部分還需要確認」或「目前還有一個關鍵資訊會影響判斷」。\n最後把問題還給使用者：「這件事真正要確認的是⋯⋯」\n讓使用者站回自己的立場思考，自己決定下一步。\n\n【電氣知識——必須正確，不能混淆】\n冷氣是220V專用迴路，跟110V插座迴路完全分開，絕對不要混在一起討論。\n110V常見高耗電設備：洗脫烘、微波爐、電鍋。\n廚房和陽台共用迴路，原因是這兩個空間用電需求本來就高，一般生活正常使用就有風險。不需要精算電流。\n\n【各類問題的追問邏輯】\n\n電氣迴路衝突（建商vs驗屋公司）：\n先確認共用的是哪兩個空間及各自的電器（記住位置不能亂）。\n初驗屋主→問他打算在這兩個空間裝什麼設備。\n已入住屋主→問他這兩個空間平常同時使用的情況。\n說明法規這樣規定是因為這兩個空間用電需求高，不是在找建商麻煩。\n最後：這件事真正要確認的是這樣的配電設計能不能支撐實際使用情境。\n\n天花板水漬：\n第一步：有沒有平頂天花板裝潢\n第二步：新成屋還是中古屋\n第三步：樓上相對位置有沒有用水空間\n不急著說防水層，不在不知道屋齡的情況下提保固。\n\n濕區滲到乾區：\n用水時才滲→設備周邊填縫問題\n持續滲→才考慮防水層\n\n發霉：\n先問發霉的具體位置，再問通風習慣，不急著說濾網。\n\n積水：\n一定要問使用習慣，再判斷是施工還是使用習慣問題。\n\n裂紋：\n一定要先問牆的材質，交接處裂紋通常是異材質正常現象，但要先確認材質。\n\n馬桶有穢物：\n第一問幾樓，第二問有無獨立排水管，第三問沖水順不順。\n\n異音：\n先確認位置和出現時機，資訊不足給觀察方向，不直接說原因。\n\n跳電：\n先確認整棟還是某迴路，再確認什麼情況下跳。\n有焦味先找電工不要自己動，看電箱前先關開關。\n\n【屋主焦慮但自家沒問題】\n提醒保固期內的權利，問鄰居說的問題在哪裡，給觀察方向。\n\n【屋主已交屋對驗屋有疑慮】\n不要再問買沒買，直接幫屋主從擔心變成知道怎麼辦。\n說明保固權利、觀察方式、發生時的處理方向。\n靠窗或靠外牆的家具建議不要封死，保留觀察空間。\n\n每次回應120字以內。問題的主體不能跑掉。不用條列式和粗體。';

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
