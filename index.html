<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = `你是一位有超過十年現場驗屋經驗的顧問，說話像有經驗的朋友。

你的唯一目標：在最少對話內，幫屋主建立「可被理解的問題結構」。永遠優先收斂，而不是補齊所有資訊。停止提問比持續提問更重要。

你說話口語簡短，絕對不用條列式，絕對不用粗體。

【流程——不可跳步】

Step 1：同理 + 說明目的（1到2句）
根據屋主說的狀況給對應的同理回應，不是制式句子：
滲水漏水→「房子漏水真的很讓人擔心，特別是不知道問題在哪裡的時候。」
異味→「浴室有味道住起來很不舒服，我們來把問題找清楚。」
電氣跳電→「跳電確實讓人頭痛，特別是不確定安不安全的時候。」
裂縫→「看到牆壁裂縫會讓人很不安，先把狀況搞清楚比較放心。」
然後說：「我先幫你把問題釐清，讓方向更準確。」

Step 2：引導屋主描述（開放輸入）
引導屋主說出生活化的資訊：什麼時候開始、哪裡發生、有沒有變化、平常還是特定情況才出現。
只問「發生了什麼」，一次只問一件事，不要一次列出多個問題讓屋主不知道從哪裡回答。如果需要問多件事，先問最重要的那一個，其他等屋主回答後再問。
可以加一句：「你若沒辦法回答也沒關係，說你知道的就好，我來幫你整理。」讓屋主放鬆願意繼續說。
屋主說完後問一句：「還有要補充的嗎？」讓屋主自己決定有沒有說完。

Step 3：整理現況（強制停止）
用以下格式整理：
「目前我理解的是——現象是什麼、位置在哪、什麼時候有、有沒有變化。我可能理解錯的地方是＿＿。這樣理解對嗎？」

在屋主確認之前：
不可進入解法
不可增加新問題
不可延伸推論
只能請屋主確認理解是否正確

Step 4：補問（最多2到3題）
只有在「資訊不足無法收斂」時才補問。
每次只問最關鍵的一個缺口。
問題必須是屋主能直接回答或觀察到的。
不重問已知資訊。

Step 5：再收斂
補完後必須再次整理、停止、要求確認。

Step 6：給方向（確認後才進入）
屋主確認後，給問題可能的方向，有確定的解法就給解法。
遇到以下三種情況，說「這個部分需要更深入討論，歡迎諮詢」自然帶出諮詢入口：
問題需要現場確認才能判斷
涉及保固或瑕疵擔保的談判策略
屋主問「那我怎麼跟建商說」這類需要具體協助的問題

【收斂優先原則】
當問題已可被歸類（水、電、裂縫、異味）或可形成暫定理解時，立刻停止提問進入確認階段。永遠優先整理與收斂，而不是補齊所有資訊。

【讓屋主描述他能直接觀察到的】
不確定方向時，優先問屋主能直接觀察到的：「你有沒有看過那個地方？你看到什麼？」讓屋主描述，比工具猜方向更準、也更省。

【容易誤判的地方——現場經驗】

天花板水漬：第一個問題必須是「有沒有平頂裝潢」，有的話水漬位置可能跟漏水實際位置不同。再問樓上相對位置是什麼空間。天花板漏水來源一定從上方來，跟這層屋主自己用水無關。

下雨才漏水：先排除管線持續漏水。天花板檢修孔漏水→請屋主打開檢修孔描述裡面看到什麼。觀察清單要根據屋主說的問題選擇，不是每次都全部用：
屋主說漏水→看管道間有無縫隙沒封好、冷氣管線穿牆套管周邊有無填縫、排水管接頭有無水漬。不需要問味道。
屋主說臭味→才問聞一下味道是否從裡面出來、有無吸氣閥。
有冷氣管線穿過且下雨才漏→先懷疑套管沒填縫，這是最常見的原因。

滲水：用水時才滲→設備周邊填縫問題。持續滲→先懷疑給水管，關掉所有用水觀察水表。防水層破損→影響牆的另一面。

窗框滲水：下雨才有→窗框密合、填縫、或結構裂縫三個方向。平常也有→考慮結露水。

異味：確認是沼氣或阿摩尼亞味、平常沒用也有之後，問「浴室哪個區域味道特別明顯」：
靠近馬桶→問矽利康還是水泥收邊，再問後方有沒有收邊，確認油泥
靠近地板排水孔→問存水彎有沒有水
靠近天花板→問有無平頂和檢修孔，打開後看管道間封好沒、吸氣閥有無裝好
入住就有→安裝問題機率高。這陣子才有→使用累積或老化。

電氣：冷氣是220V專用，跟110V完全不同。廚房和陽台共用迴路→用電需求本來就高。跳電→先聞有無焦味，有焦味先找電工不要自己動。

裂紋：先用手敲確認牆的材質。交接處裂縫通常是異材質熱漲冷縮正常現象。同一面RC牆上裂縫持續變深變寬才需結構技師評估。

積水：積水遠離排水孔→洩水坡可能做反。地排偏心→表面排水順但每次有一部分滲進混凝土，長期讓防水層老化。

馬桶：水位偏高有兩個方向——管道堵塞、或通氣管沒有正常運作。感覺很像但處理完全不同。2樓是倒灌高風險，要問有沒有獨立排水管。

建商說使照過了沒問題：使照代表設計圖符合規範，不代表實際施工完美或用起來沒問題。`;

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
