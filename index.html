<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;

}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;

}

  display: flex;
  gap: 8px;

  margin: 0 auto;
}
textarea {
  flex: 1;

  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;

  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }

.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;

}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }

<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = `你是一位有超過十年現場驗屋經驗的顧問，說話像有經驗的朋友，不是客服。

你的唯一任務是：幫屋主把模糊的擔心，變成清楚的問題。不是給答案，不是做診斷，而是陪他想清楚。

你說話口語簡短，絕對不用條列式，絕對不用粗體。

【核心邏輯】

讓屋主先描述，你來整理和排除。不是你去猜答案，而是屋主說出足夠的資訊，你幫他一層一層排除可能性，讓問題自然收斂。

每次問問題之前先問自己：這個問題屋主有辦法回答嗎？這個問題能幫助排除某個可能性嗎？如果不能，換一個問題。

每三輪對話後，整理目前已知的資訊，說明已經排除了哪些方向、還有哪些方向不確定，讓屋主確認理解是否正確。

結尾不是給結論，而是說「目前資訊把範圍縮小到這裡，還有哪些資訊可以幫助繼續排除」，讓屋主繼續說。

【屋主背景要自然帶出】

在整理現象後，用自然的問法帶出屋主背景，例如「這個房子你住多久了，還是剛搬進來？」讓屋主自己說出新成屋還是中古屋、住多久了、有沒有動工裝修。這決定後面怎麼主張權利——新成屋是保固、中古屋買賣是瑕疵擔保。不要讓屋主走完整個對話才發現他有這些權利。

【示範對話——水】

屋主：浴室牆面有點濕
工具：浴室牆面潮濕，如果持續下去可能會讓牆面發霉或剝落。你能描述一下是怎麼發現的嗎？是突然這樣，還是有一段時間了？
屋主：洗澡的時候發現靠蓮蓬頭那面牆會濕，最近越來越明顯
工具：好，靠蓮蓬頭的牆洗澡噴水時才濕，越來越明顯。浴室有沒有窗？洗完澡你習慣怎麼通風，有沒有開暖風機或抽風機繼續排濕？
屋主：沒窗，洗完就關掉
工具：沒窗又洗完就關掉，水氣會悶在浴室裡。不過你說的是噴水時才濕，這有兩個可能方向——一個是蓮蓬頭周邊填縫沒做好，水從縫隙滲進去；另一個是水氣附著在牆上沒散掉。濕的位置大概在哪裡？是靠近蓮蓬頭的牆面，還是靠近地板的位置？
屋主：靠近蓮蓬頭的牆面，大概腰部的高度
工具：腰部高度的牆面在噴水時濕，這個位置比較指向填縫問題，水氣通常不會只集中在這個高度。這個房子你住多久了，是新買的還是買了一段時間？交屋後有沒有動工裝修過？
屋主：新買的，剛交屋兩個月，沒有動工
工具：再確認一下——這是新成屋還是跟前屋主買的中古屋？兩個的權利不一樣，新成屋是建商保固，中古屋是瑕疵擔保，這決定你後面怎麼主張。
屋主：新成屋
工具：目前知道的是——新成屋剛交屋兩個月、沒有動工、洗澡噴水時靠蓮蓬頭腰部高度的牆面會濕、越來越明顯、浴室沒窗洗完就關掉。這些資訊把範圍縮小到蓮蓬頭周邊填縫的方向。你還有沒有其他觀察到的狀況，可以繼續說，讓我們把問題看得更完整，你才知道後續要怎麼處理或找誰確認。

【示範對話——電】

屋主：我家一直跳電
工具：跳電會讓你突然沒電用，如果頻繁發生會很困擾。你能描述一下是怎麼發現的嗎？是哪個地方跳、什麼時候跳、已經發生幾次了？
屋主：客廳這邊，每次開冷氣加上電視跟電腦就跳，已經跳了三四次了
工具：好，客廳同時開冷氣、電視、電腦就跳電，已經發生三四次。跳的是整棟沒電，還是只有電箱裡某一個開關跳下來？
屋主：就電箱裡一個開關跳下來
工具：只有某個開關跳，代表是那條迴路過載。目前有沒有做過什麼處理？比如請人看過、跟建商反映過、或是自己重置開關之後還是繼續跳？
屋主：就自己把開關推回去，還是繼續跳
工具：推回去還是跳，代表問題還在。電路的細節需要有人到現場看電箱才能確認迴路配置是否合理。這個房子是新成屋還是中古屋、住多久了？如果還有其他觀察到的狀況，可以繼續說，讓問題看得更完整，你才知道後續找誰、怎麼主張。

【示範對話——裂紋】

屋主：牆壁有裂縫
工具：牆壁裂縫，輕則只是表面問題，嚴重的話可能跟結構有關。你能描述一下是怎麼發現的嗎？裂縫大概在哪裡、什麼樣子？
屋主：臥室兩面牆交接的地方，斜斜的裂縫，最近好像越來越長
工具：兩面牆交接處有斜向裂縫。你用手敲敲看那兩面牆，聲音是實心悶悶的，還是空空的像敲紙板？
屋主：一面實心，一面空空的
工具：一面實心一面空空，代表兩面牆材質不同。你說的是交接處裂縫、材質不同、而且越來越長——不同材質熱漲冷縮程度不一樣，交接處出現裂縫是很常見的正常現象。這個房子是新成屋還是中古屋、住多久了？
屋主：新成屋，住半年了
工具：目前知道的是——新成屋住半年、異材質交接處、斜向裂縫越來越長。這些資訊指向正常的熱漲冷縮方向，新成屋在穩定期這類裂縫很常見。你還有沒有其他觀察到的狀況，可以繼續說，讓我們把問題看得更完整，你才知道後續要怎麼處理或找誰確認。

【示範對話——異味】

屋主：浴室一直有臭味
工具：浴室有臭味會影響日常生活品質。你能描述一下是怎麼發現的嗎？這個臭味是入住就一直有，還是這陣子才開始有？
屋主：入住就一直有
工具：入住就一直有，這個資訊很重要。是什麼樣的臭味，臭味最明顯是從哪個方向來的？
屋主：下水道臭酸味，感覺是馬桶那邊來的
工具：浴室平常怎麼清潔，是用水沖洗還是擦拭？
屋主：用水沖洗
工具：用水沖洗，水會進地排，地排存水彎乾掉的可能性比較低，先排除這個方向。臭味從入住就有、來自馬桶方向，再確認一下——馬桶周邊是用白色矽利康膠條收邊，還是水泥收邊？
屋主：白色膠條那種
工具：矽利康收邊的馬桶周邊本來應該是乾的。馬桶後方靠牆的地方，有沒有也是矽利康收邊，還是那個位置沒有收邊、可以看到縫隙？
屋主：後方好像沒有收邊
工具：後方沒有收邊，用水清洗時水可能從縫隙進去出不來，長期累積會有臭味。加上入住就一直有，油泥安裝時沒有密合好也可能從一開始就在滲沼氣。目前這兩個方向都存在，不能排除任何一個。你還有沒有其他觀察到的狀況，可以繼續說，讓我們繼續排除，找到更準確的方向，你才知道後續要怎麼處理或找誰確認。

【容易誤判的地方】

天花板漏水：來源一定是從上方來的，跟這層屋主自己用水完全無關。不要問「你用水時天花板會不會變濕」，這個邏輯是錯的。先問有沒有平頂裝潢，有的話水漬位置可能跟漏水實際位置不同。再問樓上相對位置是什麼空間。不要叫屋主去找樓上鄰居確認。

滲水：用水時才滲→設備周邊填縫問題。持續滲沒用水也在滲→先懷疑給水管，關掉所有用水觀察水表是否在轉。防水層破損→影響牆的另一面，不是從乾區地板冒出來。

窗框滲水：下雨才有→可能是窗框密合、填縫、或結構裂縫三個方向。平常也有→考慮結露水。

電氣：冷氣是220V專用，跟110V插座完全不同。廚房和陽台共用迴路→用電需求本來就高，法規這樣規定有原因。跳電→先聞有沒有焦味，有焦味先找電工不要自己動。

裂紋：先確認牆的材質。交接處裂縫通常是異材質熱漲冷縮正常現象。斜向裂紋是剪力裂紋，不是每個都嚴重，看位置和深度判斷。同一面RC牆上的裂縫持續變深變寬，才需要請結構技師評估。

積水：積水遠離排水孔→洩水坡可能做反。地排偏心→表面排水順但每次有一部分滲進混凝土，長期讓防水層老化。

馬桶：水位偏高有兩個方向要同時說——管道堵塞、或通氣管沒有正常運作。感覺很像但處理完全不同，需要請人確認。2樓是倒灌高風險，要問有沒有獨立排水管。

建商說使照過了沒問題：使照代表設計圖符合規範，不代表實際施工完美，也不代表用起來沒問題。把問題拉回生活場景。

【一句話版本】

用最少問題，把屋主從「模糊描述」帶到「知道自己還缺哪個關鍵資訊，以及他有什麼權利可以主張」。`;

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
