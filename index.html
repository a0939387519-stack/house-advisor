其他類型→新成屋還是中古屋、問題位置（如果屋主沒說）、什麼時候發生

第二步：
先判斷任務一：屋主說的有沒有包含現象＋觸發條件？
如果沒有→回覆：引導描述
如果有→判斷任務二，找出真正缺少的資訊

第三步：
如果資訊足夠→回覆：資訊足夠
如果還有缺少的資訊→直接用一個問句把所有缺少的一次問完，格式：【為了能幫您更接近並確認問題，能先跟您詢問以下幾個問題嗎？[列出缺少的問題]說完之後我會幫你整理一下，確認我理解對不對。】
只輸出一句話或兩個字，不要解釋，不要重複屋主已經說過的資訊。

特別規則——施工痕跡類（優先於漏水類判斷）：
如果屋主描述的是發現施工痕跡（針頭、修補痕跡、異常填縫、油漆顏色不一致、批土痕跡），不管有沒有提到漏水，都先判斷為施工痕跡類，回覆必須是：
「為了能幫您更接近並確認問題，能先跟您確認——這是新成屋還是中古屋、這些痕跡是最近才發現的還是一直都有、最近有沒有建商或工班進來施工？你知道的說就好。」

特別規則——漏水滲水類：
如果判斷是漏水或滲水問題（屋主說的是水漬、滲水、漏水現象，而不是施工痕跡），回覆必須是這個固定問句：
「為了能幫您更接近並確認問題，能先跟您確認以下幾件事嗎？
1. 這是新成屋還是中古屋
2. 水漬在哪個位置（哪個空間、哪面牆或天花板）
3. 是下雨才有還是一直有
4. 那個位置附近有沒有跟水有關的設備或管線（例如面盆、馬桶、冷氣排水管）
5. 附近有沒有看到其他異狀（例如滲水、白華、霉斑）
你知道的說就好。」
除非屋主已經完整回答了這五個問題，才可以回覆「資訊足夠」。`;

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    // 屋主說第一句話後，先做分類和資訊檢查，把結果傳給Sonnet決定第一句怎麼說
    if (count === 0) {
      console.log("CHECK_SYS block entered");
      try {
        var checkMessages = [
          {role:'user', content:'屋主描述：' + hist.filter(m => m.role === 'user').map(m => m.content).join('。')}
        ];
        var checkR = await fetch(API, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({system: CHECK_SYS, messages: checkMessages})
        });
        var checkData = await checkR.json();
        var checkResult = checkData.text ? checkData.text.trim() : '';
        
        // 清理checkResult，移除【】括號
        var cleanResult = checkResult.replace(/[【】]/g, '');
        
        if (cleanResult !== '引導描述' && cleanResult !== '資訊足夠') {
          // 有補問句，同理屋主感受後直接顯示補問句，不讓Sonnet跑
          showThink(false);
          // 先讓Sonnet說同理，再加補問句
          var lastUserMsg = hist[hist.length - 1];
          lastUserMsg.content = lastUserMsg.content + "\n\n[指示：屋主說的資訊已包含現象和觸發條件。請先用一句話同理屋主的感受，然後直接說以下補問句，不要說引導描述：" + cleanResult + "]";
        } else if (cleanResult === '資訊足夠') {
          var lastUserMsg = hist[hist.length - 1];
          lastUserMsg.content = lastUserMsg.content + "\n\n[指示：屋主說的資訊已足夠，請直接同理屋主的感受，然後整理確認目前知道的狀況，不要說引導描述]";
        }
        // 引導描述：繼續正常流程，Sonnet會說引導描述
      } catch(checkErr) {
        console.error("CHECK_SYS failed:", checkErr);
        // 資訊檢查失敗，繼續正常流程
      }
    }

    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
