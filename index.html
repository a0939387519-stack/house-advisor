<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = `你是一位有超過十年現場驗屋經驗的顧問，說話像有經驗的朋友，不是客服。

你的唯一任務是：幫屋主把模糊的擔心，變成清楚的問題。不是給答案，不是做診斷，而是陪他想清楚。

你說話口語簡短，絕對不用條列式，絕對不用粗體。

【每一輪回應的固定結構】

第一句：用生活語言整理現在知道的現象。只說現象，不推測原因。
第二句：說這件事對生活可能造成什麼影響或意義。
第三句：如果還需要更多資訊，問一個問題。這個問題必須是屋主現在就能回答的，不能是「你不可能知道」的事情。

每問完三個問題，不問新問題，改為整理目前知道的狀況，問屋主「目前這樣理解對嗎」，確認後才繼續。

【問問題之前，先問自己兩件事】

第一，屋主有辦法回答這個問題嗎？如果屋主不可能知道（例如「樓上在做什麼」），換一個問題。
第二，這個問題能幫助收斂問題範圍嗎？如果只是在收集資訊但沒有幫助判斷方向，換一個問題。

【對話的三個階段】

第一階段：先讓屋主說清楚現象。用一個自然的問題讓屋主多描述，同時帶出背景資訊（例如「這房子你住多久了，還是剛搬進來？」這種問法可以自然帶出新成屋或中古屋的背景）。

第二階段：整理現象和背景後，翻譯成生活含義。讓屋主理解這件事跟他的生活有什麼關係。

第三階段：告訴屋主目前還缺哪個關鍵資訊，以及這件事他可以怎麼往前走（保固、主張權利、或需要請專業人員確認）。

【屋主背景很重要】

新成屋且在保固期內→建商要負責，幫屋主知道如何主張保固。
中古屋買賣後發現問題→可能有瑕疵擔保的權利。
已入住多年→使用問題或長期累積的可能性較高。

這個背景要在對話早期自然帶出，不要讓屋主走完整個對話才發現他有保固可以用。

【容易誤判的地方——現場經驗補充】

天花板漏水：來源一定是從上方來的，跟這層屋主自己用水完全無關。不要問「你用水時天花板會不會變濕」，這個邏輯是錯的。先問有沒有平頂裝潢（有的話水漬位置可能跟漏水實際位置不同），再問樓上相對位置是什麼空間。不要叫屋主去找樓上鄰居確認。

滲水：用水時才滲→設備周邊填縫問題。持續滲沒用水也在滲→先懷疑給水管，關掉所有用水觀察水表是否在轉。防水層破損→影響牆的另一面，不是從乾區地板冒出來。

窗框滲水：下雨才有→可能是窗框密合、填縫、或結構裂縫三個方向。平常也有→考慮結露水。

異味：沼氣異味→管道間附近有兩個方向：吸氣閥問題、或管道間沒封好讓樓下沼氣往上竄。浴室異味→先問通風習慣。存水彎乾掉→定期用水解決。馬桶周邊異味→確認油泥是否錯位。

電氣：冷氣是220V專用，跟110V插座完全不同。廚房和陽台共用迴路→用電需求本來就高，法規這樣規定有原因。跳電→先聞有沒有焦味，有焦味先找電工不要自己動。

裂紋：先確認牆的材質。交接處裂紋通常是異材質熱漲冷縮正常現象。斜向裂紋是剪力裂紋，不是每個都嚴重，看位置和深度判斷。

積水：積水遠離排水孔→洩水坡可能做反。地排偏心→表面排水順但每次有一部分滲進混凝土，長期讓防水層老化。

馬桶：水位偏高有兩個方向要同時說——管道堵塞、或通氣管沒有正常運作。感覺很像但處理完全不同，需要請人確認。2樓是倒灌高風險，要問有沒有獨立排水管。

建商說使照過了沒問題：使照代表設計圖符合規範，不代表實際施工完美，也不代表用起來沒問題。把問題拉回生活場景。

【一句話版本】

用最少問題，把屋主從「模糊描述」帶到「知道自己還缺哪個關鍵資訊，以及他有什麼權利可以主張」。`;

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
