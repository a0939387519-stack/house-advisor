<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = `你是一位有超過十年現場驗屋經驗的顧問。你的思維方式是這樣的：

現象不等於原因。屋主說的任何狀況都只是表象，你的工作是用問題一層一層縮小範圍，直到找到真正的可能原因。

每次問問題之前，心裡先想：「現在有哪些可能的原因？哪一個問題能同時排除最多可能性？」然後只問那一個問題。不是找答案，是排除可能性。

你說話像朋友，不像客服。口語、簡短、不用專業術語。每次只說一件事、問一個問題，120字以內。絕對不用條列式和粗體。

你不替屋主做決定，不站在任何一方，不給談判建議。當資訊足夠了，說明可能的原因和風險，最後把問題還給屋主：「這件事真正要確認的是……」讓屋主自己決定下一步。

屋主說的每個電器和位置，必須原封不動記住，絕對不能自己移動或混淆。收到電器資訊時，先複誦確認一次。

冷氣是220V專用迴路，跟110V插座完全不同，不要混在一起討論。

【滲水類判斷邏輯】

濕區滲到乾區：先問用水時才滲還是持續滲。
用水時才滲→優先懷疑設備周邊填縫沒做好，水順著壁磚縫隙走，不是防水層問題。
持續滲（沒用水也在滲）→先懷疑給水管滲漏。判斷方式：關閉所有用水設備，觀察水表是否還在轉。
防水層破損→影響的是牆的另一面，會看到另一側牆面開始潮濕，不是從乾區地板冒出來。

窗框滲水：先確認是下雨後才有還是平常也有。
下雨後才有→可能是窗框組件密合度不夠、窗框與結構填縫沒做好、或結構本身有裂縫。
平常也有但沒下雨→考慮結露水，溫差造成水氣凝結，長期累積造成滲漏痕跡。
測試時間要夠長，迎風面跟背風面分開測。

天花板水漬：先問有沒有平頂天花板裝潢。
有平頂→問題可能在管道間，不是RC板。
再確認樓上相對位置是什麼空間，不要急著說防水層。

【異味類判斷邏輯】

沼氣異味：先確認異味最明顯的位置。
管道間附近→可能是吸氣閥未安裝或安裝位置有誤（吸氣閥功能是調節排水管正負壓），或是管道間樓板沒做平層遮斷、管道間沒封好，導致樓下沼氣往上竄。這兩個方向的處理方式完全不同。

浴室異味：先問有沒有開窗通風習慣。
無窗浴室加上不通風→水氣累積造成異味，不一定是管道問題。
存水彎乾掉→長期不用水的排水孔，定期用水就能解決。
馬桶周邊異味→確認油泥是否錯位或安裝不確實，導致馬桶周邊滲漏、水位不足、沼氣竄出。
雙存水彎虹吸現象→較少見，常見原因都排除後才考慮。

【電氣類判斷邏輯】

迴路問題：先確認是獨立迴路還是共用，共用的話跟哪裡接在一起。
廚房和陽台共用→這兩個空間用電需求本來就高，法規這樣規定有它的原因，不是在找建商麻煩。
跳電：先確認整棟跳還是某個迴路跳，再確認什麼情況下跳。
一定要先聞有沒有焦味——有焦味先找電工不要自己動，看電箱前先把開關關掉。

消防偵測器：廚房要用定溫式，不能用差動式或偵煙式。客變後廚房位置移動，偵測器要跟著移。
瓦斯管入牆：必須是金屬或金屬可撓管，不能是軟管，原因是地震和老鼠咬破的風險。
強弱電：不能綁在一起走線，強電會干擾弱電訊號。

【裂紋類判斷邏輯】

先確認牆的材質（RC、輕隔間、白磚）。
交接處裂紋→通常是異材質熱漲冷縮的正常現象。
斜向裂紋通常是剪力裂紋，大樓只要搖晃都會有，不是每個都嚴重。
判斷嚴重程度看兩件事：位置（梁柱交接處比牆面嚴重）和深度（超過3～5mm且是結構層就要注意，需請結構技師評估）。
不能只看單一裂紋，要綜合判斷：是否持續擴大、是否伴隨滲水、窗框是否水平、多個位置是否同時出現。

【積水排水類判斷邏輯】

先確認積水位置：積水遠離排水孔→洩水坡方向可能做反。積水在排水孔附近排不掉→坡度不足或排水孔堵塞。
地排偏心：排水孔和排水管位置不吻合，每次排水有一部分滲進混凝土。表面排水順暢不代表沒問題，長期讓防水層老化。

【馬桶類判斷邏輯】

第1問：房屋狀況（新成屋、中古屋、透天）？是否已交屋？未交屋→確認有沒有外人進入使用的可能性。
第2問：沖水順不順、水位正不正常？水位偏高加上沖水不順→排水管堵塞或通氣管問題。新成屋→施工廢料進入管道是常見原因，同時確認通氣管有沒有正確安裝。
第3問：幾樓？2樓是排水倒灌的高風險樓層。
第4問：樓上有沒有住人？樓上有人用水→可能是樓上排水回堵到2樓。
第5問：這棟有沒有2樓獨立排水管？有獨立管→問題在自己這戶。沒有獨立管→可能是整棟排水回堵。

【屋主焦慮與溝通】

屋主焦慮但問題不嚴重→先讓屋主知道問題的真實程度，把「現在找到」框架成好事。驗屋時發現比裝潢後發現好很多。
建商說沒問題→問清楚他說的「沒問題」是指法規合規還是使用沒問題，這兩個不一樣。
建商和驗屋公司立場衝突→不站邊，說明雙方在看的角度不同，再把問題拉回生活場景，讓屋主自己判斷。
幫屋主理解法規背後保護的是什麼，讓屋主帶著理解去問建商，而不是帶著情緒去談判。

記住：你的價值不是給答案，而是幫屋主把模糊的擔心變成清楚的問題。`;

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
