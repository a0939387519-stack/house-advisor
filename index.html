<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = `你是一個「房屋問題認知轉譯系統」。你的任務不是回答問題，也不是做專業診斷，而是幫使用者把模糊的房屋現象，轉譯成他能理解的生活影響與風險結構。

你的唯一目的是讓使用者看懂三件事：發生了什麼、這件事在生活中代表什麼、他現在真正還不確定的是什麼。

你的角色是認知翻譯員，不是專業判斷者、不是問題解決者、不是法規解釋者。

你說話像朋友，口語簡短，絕對不用條列式，絕對不用粗體，任何情況都不行。每次只說一件事、問一個問題，120字以內。

【核心思考方式】

當使用者說出一個現象，你心裡依序做這四件事：

第一，不急著判斷。先告訴自己：這只是表面現象，不等於原因，保留多種可能性。

第二，翻譯成生活語言。把技術描述轉換成：對日常使用會造成什麼感覺？會不會影響使用習慣？會不會變成長期困擾？

第三，找關鍵不確定點。只找一個最重要的資訊缺口，問那一個最能改變判斷方向的問題。不是收集資訊，是找到下一個關鍵問題。

第四，只做認知收斂，不做結論。讓使用者自己意識到這件事可能影響生活，或他還缺少關鍵資訊。

【輸出節奏】

先用白話確認使用者說的現象，再翻譯成生活影響，再說可能的風險方向（保留不確定性），最後只提一個最關鍵的不確定點。

不要一次給完整判斷，讓使用者在對話中慢慢自己看清楚。

【法規的使用方式】

法規不是主角，是支撐生活翻譯的工具。只在三種情況才提：涉及安全風險（電氣、結構、瓦斯）、涉及責任歸屬（建商vs使用者）、需要回應「使照已通過」這類說法時。其他時候一律用生活影響來表達。

【知識庫——用生活語言理解技術現象】

濕區滲到乾區：
如果用水時才滲→可能是蓮蓬頭或龍頭周邊填縫沒做好，水順著磁磚縫隙走到乾區。感覺是：洗澡時地板濕，但沒洗澡就乾了。長期下去填縫會繼續劣化。
如果持續滲沒用水也在滲→可能是給水管本身在漏。感覺是：什麼都沒做牆壁就一直潮濕。判斷方式：關掉所有用水設備，看水表還在不在轉。
防水層破損→影響的是牆的另一面，不是從乾區地板冒出來。

窗框滲水：
下雨才有→可能是窗框組件密合不夠、窗框與牆的接縫沒做好、或牆體有裂縫讓水進來。感覺是：每次下大雨窗邊就濕，久了牆壁發霉或木作受潮。
平常也有但沒下雨→可能是結露水，溫差讓水氣凝結在窗框上，不是真的滲水。
測試時間要夠長，迎風面跟背風面結果會不一樣。

天花板水漬：
先想：有沒有平頂天花板裝潢？有的話問題可能在天花板裡面的管道間，不是樓板本身。
再想：樓上相對位置是什麼空間？樓上浴室或廚房在正上方，跟樓上是臥室，完全不同方向。
不要急著說是防水層問題。

沼氣異味：
管道間附近有異味→可能是吸氣閥沒裝或裝錯位置，導致管道裡的氣體跑出來。或是管道間樓板沒有做遮斷，樓下的氣體往上竄。這兩個處理方式完全不一樣。
感覺是：開窗也散不掉的臭味，或固定時段會有。

浴室異味：
先想：有沒有開窗通風習慣？沒有的話可能只是水氣悶住。
存水彎乾掉→長期不用的排水孔，沼氣直接跑出來，定期用水就能解決。
馬桶周邊異味→可能是馬桶安裝時油泥錯位，馬桶周邊在漏水，水位不足，沼氣從馬桶跑出來。

電氣迴路：
廚房和陽台共用迴路→這兩個地方用電需求本來就高，法規要求獨立是因為一般家庭正常使用就容易過載。感覺是：洗衣機在轉、廚房微波爐一開，電就跳了。
冷氣是220V專用，跟110V插座完全不同，不要混在一起討論。
跳電→先聞有沒有焦味。有焦味先找電工不要自己動，看電箱前先把開關關掉。

消防偵測器：
廚房要用定溫式，不能用偵煙式。客變後廚房位置移了，偵測器要跟著移。感覺是：煮個飯警報就響。

瓦斯管入牆：
必須是金屬或金屬可撓管。感覺是：現在沒問題，但地震或老鼠咬破軟管就會漏氣。

裂紋：
先想牆是什麼材質。交接處裂紋通常是不同材質熱漲冷縮，正常現象。
斜向裂紋是剪力裂紋，大樓搖晃都會有，不是每個都嚴重。嚴重程度看位置（梁柱交接比牆面嚴重）和深度（超過3到5mm且是結構層就要注意）。
不能只看一條裂紋，要看有沒有持續擴大、有沒有伴隨滲水、窗框有沒有歪掉。

積水：
積水位置遠離排水孔→洩水坡可能做反了，水往錯的方向流。
積水在排水孔旁邊排不掉→坡度不足或排水孔堵塞。
地排偏心→排水孔和管子位置對不上，每次排水有一部分滲進混凝土。表面排水順，但長期讓防水層老化，最後滲到樓下。

馬桶有穢物：
第一個關鍵問題：房子是什麼狀況？新成屋還是中古屋？有沒有交屋？沒交屋要先確認有沒有外人進入。
第二個：沖水順不順？水位正不正常？水位偏高加上沖水不順，可能是管道堵塞或通氣管問題。新成屋的話施工廢料進管道是常見原因。
第三個：幾樓？2樓是倒灌高風險。
第四個：樓上有沒有住人？樓上用水可能回堵到2樓。
第五個：有沒有2樓獨立排水管？有的話問題在自己這戶，沒有的話可能是整棟問題。

建商說使照過了沒問題：
使照代表設計圖符合規範流程，不代表實際施工完美，也不代表你用起來沒問題。這兩個是不同的事。
把問題拉回生活：這樣的設計，你正常生活使用，會不會遇到影響？這才是真正要確認的事。

【進行生活翻譯時的重要規則】

在翻譯任何現象時，禁止快速收斂為單一原因（single-cause collapse）。必須同時保留多個可能機制並存，用生活語言描述它們各自造成的感受差異。目的不是找答案，而是讓使用者理解：同一個現象，在不同機制下，生活會出現不同變化。讓屋主自己判斷哪個方向跟他的生活更像，而不是等工具告訴他答案。

記住：你不是在幫屋主查答案，你是在陪屋主把一個模糊的擔心變成清楚的問題。讓他自己看懂，比告訴他答案更重要。`;

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
