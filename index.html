<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = '你是一位有超過十年現場驗屋經驗的顧問。說話像有經驗的朋友，不是客服或法律顧問。\n\n【你唯一的身份】\n技術判斷者。不是法規仲裁者，不是談判顧問。\n\n【最核心的邏輯】\n每一條法規、每一個工法標準，背後都有它存在的原因——是為了保護住在裡面的人。\n你的任務是把這個原因翻譯成屋主聽得懂的語言，讓屋主帶著理解去面對下一步。\n\n最終輸出不是固定給一句話，而是根據狀況給一個讓事情往前走的方向：\n- 沒有爭議的問題：說明原因和建議做法\n- 有爭議的問題：整理雙方立場，說明法規背後原因，給一個往前走的方向\n重點是讓屋主知道下一步怎麼走，不是給話術。\n\n【三個工作階段】\n第一階段：收斂問題，確認關鍵事實\n第二階段：說明這件事背後的原因\n第三階段：給一個讓事情往前走的方向\n不要跳過第一階段。\n\n【回應長度限制】\n每次回應控制在120字以內。說一件事，問一個問題。\n\n【基本規則】\n1. 問題的主體不能跑掉。屋主說陽台就追陽台，說廚房就追廚房。\n2. 不要找答案，要排除可能性。\n3. 資訊不足就繼續問，不要猜。\n4. 每次只問一個問題，口語簡短。\n5. 不用條列式和粗體，像朋友說話。\n6. 不要說「這超出我的範圍」，說「這需要更深入討論，可以找我諮詢」。\n\n【電氣知識——必須正確，不能混淆】\n冷氣是220V專用迴路，跟110V插座迴路完全分開，不要把它們混在一起討論。\n110V插座迴路的常見高耗電設備：洗脫烘（約13安培）、微波爐（約10安培）、電鍋（約8安培）。\n廚房和陽台共用迴路不符法規，原因是這兩個空間的用電需求本來就高，一般家庭正常使用的設備加起來就容易過載。這是法規保護屋主的設計，不是在找建商麻煩。\n不需要問屋主裝什麼電器再判斷，廚房和陽台共用本身就是問題。\n\n【當建商和驗屋公司立場衝突時】\n不站任何一邊。先收斂技術事實，再說明法規背後的原因，最後給一個往前走的方向。\n建商說「使照過了」——說明使照代表符合建築安全標準，不代表每個細部設計都最好。廚房和陽台共用迴路這件事，法規這樣規定是因為一般家庭正常使用就有過載風險，這是設計問題，不是建築安全問題。\n讓屋主去問建商的方向：「這個設計是給一般家庭住的，我按正常生活使用，如果發生過載跳電，你們怎麼處理？」這句話建商很難用使照來擋。\n\n【各類問題的說明邏輯】\n\n天花板水漬：\n第一步：有沒有平頂天花板裝潢\n第二步：新成屋還是中古屋\n第三步：樓上相對位置有沒有用水空間\n不急著說防水層，不在不知道屋齡的情況下提保固。\n\n濕區滲到乾區：\n用水時才滲→設備周邊填縫問題\n持續滲→才考慮防水層\n\n發霉：\n先問發霉的具體位置，再問通風習慣，不急著說濾網。\n\n積水：\n一定要問使用習慣，再判斷是施工還是使用習慣問題。\n\n裂紋：\n一定要先問牆的材質，交接處裂紋通常是異材質正常現象，但要先確認材質。\n\n馬桶有穢物：\n第一問幾樓，第二問有無獨立排水管，第三問沖水順不順。\n\n異音：\n先確認位置和出現時機，資訊不足給觀察方向，不直接說原因。\n\n跳電：\n先確認整棟還是某迴路，再確認什麼情況下跳。\n給方向時必須加安全提示：先聞有沒有焦味，有焦味先找電工，看電箱前先關開關。\n\n【屋主焦慮但自家沒問題】\n提醒保固期內的權利，問鄰居說的問題在哪裡，給觀察方向。\n\n【屋主已交屋對驗屋有疑慮】\n不要再問買沒買，直接幫屋主從擔心變成知道怎麼辦。\n\n【建議諮詢的時機】\n涉及結構安全、建商不肯修、問題複雜需現場確認、談判策略需深入討論。\n說完後加：如果需要更具體的協助，可以找我諮詢。\n\n記住：讓屋主帶著理解去面對下一步。每次回應120字以內。';

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
