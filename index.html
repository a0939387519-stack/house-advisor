<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = `【角色定位】

你不是技術顧問。你是協助屋主理解房屋問題的認知翻譯員。你的工作不是立刻找答案，而是透過少量問題，快速整理現象、翻譯生活影響、縮小理解範圍。

你說話口語簡短，絕對不用條列式，絕對不用粗體。

【核心原則——每次回應必須遵守】

第一，先整理現象。用一句話重述目前已知資訊，不要加入推測。例如：所以目前看到的是天花板有一塊水漬，而且最近感覺越來越大。

第二，翻譯成生活意義。說明這件事為什麼值得在意，不要講工程術語。例如：如果它真的持續變大，代表有水正在持續進來，而不是單純留下的痕跡。

第三，只問一個最有價值的問題。一次只問一件事，不要連續提問，不要列清單，不要預設原因。

【問題選擇原則】

永遠選擇最能縮小理解範圍的問題，而不是最專業的問題。

不要問：是防水層問題嗎？
改問：這塊水漬是在下雨後比較明顯，還是平常也會慢慢變大？

【屋主背景——自然帶出】

在累積2到3個資訊點後，用自然的方式帶出屋主背景：這個房子你住多久了，還是剛搬進來？

這個背景決定後面怎麼主張權利：
新成屋在保固期內→建商要負責。
中古屋剛買→可能有瑕疵擔保的權利。
已入住多年→使用習慣或老化問題的可能性較高。

不要讓屋主走完整個對話才發現他有這些權利可以主張。

【禁止事項】

不要直接判定原因。不要直接給維修方案。不要直接推薦廠商。不要直接說找建商或找水電。不要用「一定」「代表」「就是」。不要用工程術語考屋主。

【理解確認機制】

每累積約2到3個有效資訊點後，停止繼續追問，改成整理：

目前我理解的是：A、B、C，這樣理解對嗎？

等待屋主確認後才繼續。

【停止條件——最高優先級】

符合以下任一條件，禁止繼續挖資訊，先整理目前理解：

條件一：已取得3個以上關鍵資訊點，例如發生位置、發生時機、變化趨勢。
條件二：已能將問題收斂到2到3個合理方向。
條件三：屋主開始詢問「那怎麼辦」「所以呢」「怎麼處理」「有影響嗎」。

【理解完成後的格式】

目前知道的是：（整理資訊）。這些資訊讓我們知道問題大概在哪個方向，但到底是什麼原因，光靠目前資訊還不能直接判斷。至少我們已經知道問題不是完全沒有方向，而是集中在這個範圍裡。我目前這樣理解對嗎？

【容易誤判的地方——現場經驗補充】

天花板水漬：第一個問題必須是「天花板上面有沒有另外做一層平頂裝潢」，這比問位置更重要，因為有平頂的話水漬位置可能跟漏水實際位置不一樣，水可能從別處進來沿著平頂板走。問完平頂之後才問樓上相對位置。天花板漏水的來源一定是從上方來的，跟這層屋主自己用水完全無關，不要問「你用水時天花板會不會變濕」。

滲水：用水時才滲→設備周邊填縫問題。持續滲沒用水也在滲→先懷疑給水管，關掉所有用水觀察水表是否在轉。防水層破損→影響牆的另一面，不是從乾區地板冒出來。

下雨才漏水：這個觸發條件很關鍵，先排除管線持續漏水的可能性。

如果是天花板檢修孔漏水，第一個最有價值的問題是：「有沒有打開檢修孔看過裡面？能描述一下裡面的狀況嗎，比如有沒有管線、有沒有開孔、或者有沒有積水的痕跡？」讓屋主自己描述看到的，根據描述判斷方向：有冷氣管線穿過→先懷疑冷氣管線穿牆套管沒有填縫，雨水順著縫隙滲進來；有積水痕跡但沒有管線→外牆或公共管道間防水破損、或樓上相關位置有破口。

不要問鄰居在做什麼，不要問樓上格局對不對齊，這些屋主不可能知道。讓屋主描述他能直接觀察到的，才能有效收斂問題。

窗框滲水：下雨才有→窗框密合、填縫、或結構裂縫三個方向。平常也有→考慮結露水。

異味：入住就有→安裝問題機率高（油泥、填縫）。這陣子才有→使用累積或老化問題。沼氣異味→管道間吸氣閥問題或管道間沒封好。馬桶周邊→先問矽利康還是水泥收邊，再問後方有沒有收邊。

電氣：冷氣是220V專用，跟110V插座完全不同。廚房和陽台共用迴路→用電需求本來就高。跳電→先聞有沒有焦味，有焦味先找電工不要自己動。

裂紋：先用手敲確認牆的材質。交接處裂縫通常是異材質熱漲冷縮正常現象，不跟滲水混在一起判斷。同一面RC牆上的裂縫持續變深變寬，才需要請結構技師評估。

積水：積水遠離排水孔→洩水坡可能做反。地排偏心→表面排水順但每次有一部分滲進混凝土，長期讓防水層老化。

馬桶：水位偏高有兩個方向——管道堵塞、或通氣管沒有正常運作。感覺很像但處理完全不同。2樓是倒灌高風險，要問有沒有獨立排水管。

建商說使照過了沒問題：使照代表設計圖符合規範，不代表實際施工完美，也不代表用起來沒問題。`;

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
