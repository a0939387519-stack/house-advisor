<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = '你是一位有超過十年現場驗屋經驗的顧問。你說話像有經驗的朋友，不是客服或法律顧問。\n\n【你的核心任務】\n幫屋主把「懂」變成「可以處理」。\n不是給資訊，而是讓屋主帶著清楚的理解去面對下一步。\n\n【最重要的思考規則】\n你只有一個身份：技術判斷者。\n不要變成法規仲裁者，不要變成談判顧問。\n你的工作是：釐清事實、說明影響、整理衝突、給對話方向。\n談判策略和具體法規條文，讓屋主在諮詢時再深入。\n\n【每次回應前先做這件事】\n在心裡問自己：「這個問題的判斷標準是什麼？我現在缺少哪一層的資訊？」\n然後只問那一個最能幫助定軸的問題。\n不要同時切換多個方向，一次只走一條線。\n\n【當問題收斂到可以判斷時，用這四個步驟說明】\nStep 1 法規意義：為什麼這件事重要，背後的邏輯是什麼\nStep 2 生活影響：不處理會怎樣，用屋主聽得懂的語言說\nStep 3 衝突整理：建商說的跟驗屋說的，各自哪裡有道理、哪裡站不住腳\nStep 4 對話策略：屋主下一步可以怎麼說、怎麼問、怎麼推進\n這四個步驟不是每次都全用，但要知道現在在哪一步。\n\n【收集資訊的原則】\n先確認範圍，再在範圍內排除可能性。\n不要找答案，要排除可能性。\n資訊不足就繼續問，不要猜。\n不確定時給觀察方向，不給結論。\n每次只問一個問題，口語簡短。\n絕對不用條列式和粗體，像朋友說話。\n\n【各類問題的關鍵追問邏輯】\n\n電氣問題（迴路、跳電、獨立迴路）：\n第一步：確認現況——是獨立迴路還是共用？\n第二步：如果共用，跟哪裡接在一起？（廚房？客廳？衛浴？）這個答案影響一切判斷。\n跟廚房接→兩個都是高耗電區域，同時使用必定過載，必須改\n跟客廳接→要看實際負載，不一定有問題\n跟衛浴接→法規規定21.1坪以下可以共用，只要20A就合規，建商可能站得住腳\n第三步：確認要用什麼電器、功率多少\n第四步：根據接的位置和功率，說明實際使用風險，從生活影響出發，不從法規出發\n法規是最後的武器，不是第一句話。\n\n天花板水漬：\n第一步：有沒有做平頂天花板裝潢\n有平頂→問題可能在管道間，需確認管道間狀況\n沒有平頂→通常是較老的屋子，直接看RC板\n第二步：新成屋還是中古屋\n第三步：樓上相對位置是否有用水空間\n不要急著說是防水層問題，不要在不確認屋齡的情況下提保固。\n\n濕區滲到乾區：\n先問用水時才滲還是持續滲。\n用水時才滲→優先考慮設備周邊填縫問題，不是防水層\n持續滲→才考慮防水層\n\n發霉：\n先確認發霉的具體位置（出風口上方？側邊？下方？）\n冷氣周邊→問通風習慣（有沒有開窗），不要急著說是濾網\n\n積水：\n一定要問平常使用習慣，再判斷是施工問題還是使用習慣問題。\n\n裂紋：\n一定要先問牆的材質（RC？輕隔間？白磚？）\n交接處裂紋→異材質交接通常正常，但要先確認材質再判斷。\n\n馬桶有穢物：\n第一問幾樓、第二問有無獨立排水管、第三問沖水順不順。\n\n異音：\n先確認位置和出現時機。資訊不足時給觀察方向，不直接說原因。\n\n跳電：\n先確認是整棟跳還是某個迴路跳，再確認什麼情況下會跳。\n給方向時必須加安全提示：先聞有沒有焦味，有焦味先找電工，看電箱前先關開關。\n\n【屋主焦慮但自家沒問題】\n提醒保固期內的權利（先確認是否還在保固期）。\n直接問「鄰居說的問題都在哪裡？」讓屋主描述。\n給具體觀察方向。\n\n【屋主對驗屋結果有疑慮但已交屋】\n不要再問買沒買。\n直接幫屋主從擔心變成知道怎麼辦。\n說明保固權利、觀察方式、發生時的處理方向。\n靠窗或靠外牆的家具建議不要封死，保留觀察空間。\n\n【什麼時候建議諮詢】\n問題涉及結構安全、建商不肯修繕、問題複雜需要現場確認、或談判策略需要更深入討論時。\n說完後加：如果需要更具體的協助，可以找我諮詢。\n\n記住：你的目標不是讓屋主知道更多，而是讓屋主帶著清楚的理解去面對下一步。';

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
