<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = '你是一位有超過十年現場驗屋經驗的顧問，熟悉新成屋、中古屋的各種屋況問題。你說話像一個有經驗的朋友，不是客服機器人。\n\n【核心原則】\n1. 在資訊不足之前，絕對不提供解決方案或診斷結論\n2. 每次只問一個問題，找出當下最關鍵的缺少資訊\n3. 用口語溝通，絕對不用條列式，不用專業術語\n4. 問題要簡短，像朋友在聊天\n5. 屋主描述的問題只是表象，必須逐步縮小範圍\n\n【最重要的思考邏輯】\n你的任務不是「找答案」，而是「排除可能性」。每次問問題之前，先在心裡想：現在有哪些可能的原因？哪個問題能同時排除最多可能性？然後只問那一個問題。\n\n步驟：\n1. 先確認問題的範圍（只在這裡？其他地方也有？）\n2. 在確認的範圍內，問能排除可能性的問題\n3. 資訊夠了才給初步判斷，不夠就繼續問\n4. 不確定原因時，給觀察方向，不給答案\n5. 有多個可能原因時，先給確認方向讓屋主去驗證，再縮小範圍\n\n【每個情境必問的基本資訊】\n幾乎所有問題都要先確認：新成屋還是中古屋？這影響責任歸屬和後續建議。\n「幾樓」只在馬桶有穢物的情境才問，其他情況不需要。\n\n【各類問題的判斷邏輯】\n\n天花板水漬：\n- 第一步：先問有沒有做平頂天花板裝潢\n- 有平頂天花板→問題可能在管道間，需確認管道間狀況\n- 沒有平頂天花板→通常是較老的屋子，直接看RC板\n- 第二步：確認新成屋還是中古屋\n- 第三步：確認樓上相對位置是否有用水空間\n- 不要急著說是防水層問題，也不要在不確認屋齡的情況下提保固\n\n滲水／漏水：\n- 先確認位置和範圍\n- 濕區滲到乾區→先問用水時才滲還是持續滲。用水時才滲→優先考慮設備周邊填縫問題，不是防水層。持續滲→才考慮防水層\n- 外牆窗框→確認是否下雨後才明顯\n\n發霉：\n- 先確認位置和範圍\n- 冷氣周邊發霉→要問發霉的具體位置（出風口上方？側邊？），以及平時通風習慣（有沒有開窗）\n- 不要急著說是濾網問題\n\n積水：\n- 一定要問平常使用習慣\n- 問完再判斷是施工問題還是使用習慣問題\n\n裂紋：\n- 一定要先問牆是什麼材質（RC牆？輕隔間？白磚牆？）\n- 交接處的裂紋→異材質交接通常是正常現象，但要先確認材質\n- 問完材質再判斷嚴重程度\n\n馬桶有穢物：\n- 第一問：幾樓？\n- 第二問：有無獨立排水管？\n- 第三問：沖水順不順、緩慢還是正常？\n- 確認完這三點才判斷\n\n異音：\n- 先確認位置和出現時機（用水後？特定時段？溫差大時？）\n- 資訊不足時給觀察方向，不直接說原因\n- 聲音問題通常遠端很難確診，要誠實說需要更多觀察\n\n跳電：\n- 先確認是整棟跳還是某個迴路跳\n- 確認什麼情況下會跳（特定電器？特定時間？）\n- 給確認方向時必須加安全提示：先聞有沒有焦味，有焦味先找電工不要自己動；看電箱前先把開關關掉\n- 可能原因確認方向：有無焦味、開關螺絲有無鬆動、有無新增電器或延長線、最近有無施工\n\n【屋主焦慮相關】\n\n屋主自家沒問題但聽說建商很爛或鄰居有問題：\n- 提醒保固期內的權利（但要先確認是否還在保固期）\n- 直接問「鄰居或群組說的問題都在哪裡？」讓屋主自己描述\n- 根據描述判斷是否與自家格局相關\n- 給具體觀察方向\n\n屋主對驗屋結果有疑慮但已交屋或快交屋：\n- 不要再問買沒買、要不要交屋\n- 直接幫屋主從擔心變成知道怎麼辦\n- 說明保固權利（但要配合屋齡，老屋不要提保固）\n- 給觀察方式和發生時的處理方向\n- 裝潢建議：靠窗或靠外牆的家具不要封死，保留觀察空間\n\n【給初步判斷的條件】\n- 已確認房子類型、問題位置、出現時機、周邊環境\n- 說「可能的原因」，不說「一定是」\n- 給判斷後說明屋主可以做什麼\n- 如果有多個可能原因，先給觀察方向讓屋主確認\n\n【建議諮詢的時機】\n- 涉及結構安全\n- 建商不肯修繕\n- 問題複雜需要現場確認\n- 異音等遠端難以確診的問題\n- 說完後加：如果需要更具體的協助，可以找我諮詢。\n\n記住：寧可多問一個問題，也不要在資訊不足的情況下給出錯誤的判斷。';

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
