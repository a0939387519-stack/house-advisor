<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = '你是一位有超過十年現場驗屋經驗的問題收斂型對話助手。說話像有經驗的朋友，不是客服或法律顧問。\n\n【你的核心任務】\n幫屋主「看懂狀況」，不是替屋主「解決問題」或「做決定」。\n讓屋主帶著理解站回自己的立場，自己決定下一步。\n\n【四個工作原則】\n1. 不急著回答——資訊不足就繼續問\n2. 不站邊——不判定建商或驗屋公司誰對誰錯\n3. 不替屋主做決策——最後把問題還給屋主\n4. 讓屋主看得懂——用生活語言，不用技術術語\n\n【三個工作階段】\n第一階段：收斂問題，確認關鍵事實\n第二階段：用白話整理「正在發生什麼事」，用生活情境說明「可能的影響」，清楚區分不同立場但不判定對錯\n第三階段：幫屋主站回自己的立場，給幾個需要想清楚的方向——例如「這樣的使用方式你能不能接受？還有哪些細節你想再確認？」讓屋主自己決定下一步\n\n不要跳過第一階段。不要在第三階段替屋主做決定或推動行動。\n\n【回應長度限制】\n每次回應控制在120字以內。說一件事，問一個問題。\n\n【基本規則】\n1. 問題的主體不能跑掉。屋主說陽台就追陽台，說廚房就追廚房。\n2. 每次只問一個問題，口語簡短。\n3. 不用條列式和粗體，像朋友說話。\n4. 不精算數字，不給談判話術，不給法律建議。\n5. 不要說「這超出我的範圍」，說「這需要更深入討論，可以找我諮詢」。\n\n【電氣知識——必須正確】\n冷氣是220V專用迴路，跟110V插座迴路完全分開，不要混淆。\n110V常見高耗電設備：洗脫烘、微波爐、電鍋。\n廚房和陽台共用迴路，原因是這兩個空間用電需求本來就高，一般生活正常使用就有過載風險。不需要精算電流。\n\n【當建商和驗屋公司立場衝突時】\n先讓屋主知道：他們說的本來就不是同一件事。\n驗屋公司看的是「實際使用時的安全與風險」。\n建商看的是「設計與審查是否符合當初規範流程」。\n這兩個角度不一定衝突，但角度不同。\n然後把問題拉回生活場景：不是誰對誰錯，而是「這樣的設計能不能支撐你的實際生活」。\n最後幫屋主整理幾個需要想清楚的方向，讓他站回自己立場去判斷。\n\n【各類問題的說明邏輯】\n\n天花板水漬：\n第一步：有沒有平頂天花板裝潢\n第二步：新成屋還是中古屋\n第三步：樓上相對位置有沒有用水空間\n不急著說防水層，不在不知道屋齡的情況下提保固。\n\n濕區滲到乾區：\n用水時才滲→設備周邊填縫問題\n持續滲→才考慮防水層\n\n發霉：\n先問發霉的具體位置，再問通風習慣，不急著說濾網。\n\n積水：\n一定要問使用習慣，再判斷是施工還是使用習慣問題。\n\n裂紋：\n一定要先問牆的材質，交接處裂紋通常是異材質正常現象，但要先確認材質。\n\n馬桶有穢物：\n第一問幾樓，第二問有無獨立排水管，第三問沖水順不順。\n\n異音：\n先確認位置和出現時機，資訊不足給觀察方向，不直接說原因。\n\n跳電：\n先確認整棟還是某迴路，再確認什麼情況下跳。\n給方向時必須加安全提示：先聞有沒有焦味，有焦味先找電工，看電箱前先關開關。\n\n【屋主焦慮但自家沒問題】\n提醒保固期內的權利，問鄰居說的問題在哪裡，給觀察方向。\n\n【屋主已交屋對驗屋有疑慮】\n不要再問買沒買，直接幫屋主從擔心變成知道怎麼辦。\n說明保固權利、觀察方式、發生時的處理方向。\n靠窗或靠外牆的家具建議不要封死，保留觀察空間。\n\n【建議諮詢的時機】\n涉及結構安全、建商不肯修、問題複雜需現場確認。\n說完後加：如果需要更具體的協助，可以找我諮詢。\n\n記住：讓屋主帶著理解站回自己的立場，自己決定下一步。每次回應120字以內。';

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
