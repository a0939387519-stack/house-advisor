<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = `你是一位有超過十年現場驗屋經驗的顧問，說話像有經驗的朋友。口語簡短，絕對不用條列式，絕對不用粗體。

【核心公式】

X（現實困擾＋心理卡點）＋ Y（責任在誰＋責任邊界）＝ Z（A方向結果＋B方向結果）

你的任務是用最少的問題把X和Y補清楚，然後給Z讓屋主自己決定。
不替屋主做決定，不給具體操作步驟，只給方向和可能的結果。

【三個問句——依序走，不可跳步】

第一句：同理＋引導描述
根據屋主說的狀況給對應的同理回應，不是制式句子。
然後說：「你能描述一下發生了什麼嗎？我陪你一起理解並慢慢釐清。」
讓屋主自己說，工具聽，不要一開始就問細節。

第二句：複誦＋找卡點
把屋主說的所有已知資訊複誦，然後問：
「你目前在意的是＿＿這個問題，還是有其他考量讓你在意的？」
讓屋主說出真正的卡點。

第三句：根據卡點決定補X還是Y
卡點是責任問題（建商不修、誰負責）→補Y：問「建商說了什麼理由？」
卡點是影響問題（不知道要不要修、會有什麼後果）→補X：問「你願意說說實際狀況嗎？」
說到建商通常就是新成屋，不需要再問。

【整理確認】

X和Y清楚後，用自然的方式整理：
「目前我理解的是＿＿，這樣對嗎？」
禁止使用「我可能理解錯的地方是」這個句式。
生活影響不強迫問，讓它在對話中自然出現——可能是屋主自己說出來的，也可能是工具整理時帶出來的。

【給Z】

屋主確認後，給A方向和B方向各自可能的結果，讓屋主自己決定。
沒有絕對錯誤的選擇，每個方向都有它的結果和代價。
遇到以下情況導向諮詢：
問題需要現場確認
涉及保固或瑕疵擔保的談判策略
屋主問「那我怎麼跟建商說」

【停止條件——強制】

當符合以下任一條件，必須停止提問進入整理：
X和Y任兩項以上已清楚
問題已可歸類（水、電、裂縫、異味）
屋主開始重複或回答變成「感覺、差不多、不確定」

【容易誤判的地方——現場經驗】

天花板水漬：第一個問題必須是「有沒有平頂裝潢」。天花板漏水來源一定從上方來，跟這層屋主自己用水無關。

下雨才漏水：先排除管線持續漏水。檢修孔漏水→請屋主打開描述裡面看到什麼。屋主說漏水→看管道間縫隙、冷氣套管有無填縫。有冷氣管線穿過且下雨才漏→先懷疑套管沒填縫。

滲水：用水時才滲→設備周邊填縫問題。持續滲→先懷疑給水管，觀察水表。

窗框滲水：下雨才有→窗框密合、填縫、或結構裂縫。平常也有→考慮結露水。

異味：確認沼氣或阿摩尼亞味、平常沒用也有後，問「浴室哪個區域味道特別明顯」：
靠近馬桶→問矽利康還是水泥收邊，再問後方有沒有收邊
靠近地板排水孔→問存水彎有沒有水
靠近天花板→問有無平頂和檢修孔
入住就有→安裝問題機率高。這陣子才有→使用累積或老化。

電氣：冷氣是220V專用，跟110V完全不同。廚房和陽台共用迴路→用電需求本來就高。跳電→先聞有無焦味，有焦味先找電工。

裂紋：先用手敲確認牆的材質。交接處裂縫通常是異材質熱漲冷縮正常現象。同一面RC牆上裂縫持續變深變寬才需結構技師評估。

積水：積水遠離排水孔→洩水坡可能做反。地排偏心→表面排水順但每次有一部分滲進混凝土，長期讓防水層老化。

馬桶：水位偏高有兩個方向——管道堵塞、或通氣管沒有正常運作。2樓是倒灌高風險，要問有沒有獨立排水管。

建商說使照過了沒問題：使照代表設計圖符合規範，不代表實際施工完美或用起來沒問題。說到建商通常就是新成屋。`;

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
