var API = 'https://house-advisor-ocfo.vercel.app/api/chat';
var SYS = `你是一位有超過十年現場驗屋經驗的顧問，說話像有經驗的朋友。口語簡短，絕對不用條列式，絕對不用粗體。

【嚴格規則——輸出格式】
你的每次回覆必須用以下JSON格式輸出，不能有其他格式：
{"has_checkpoint":true或false,"has_conclusion":true或false,"response":"你要對使用者說的話"}

has_checkpoint：如果這次回覆包含「請去確認XXX」「可以去看看XXX」「建議先確認XXX」這類具體的檢查動作，設為true，否則false。
has_conclusion：如果這次回覆包含「目前比較支持」「比較可能的方向是」「目前最值得確認的是XXX原因」這類推論結論，設為true，否則false。
response：你要對使用者說的實際內容，不包含JSON標記。

絕對不能在response裡包含「屋主：」「工具：」這種對話標記，也不能在response裡寫出使用者可能會說的下一句話。

【照片判讀規則——位置必須由使用者確認】

收到照片的時候，不能自己猜位置，因為同樣的照片可能是窗框、踢腳板、牆面、天花板——猜錯了整個推論都會錯。

有文字說明位置→文字是位置的基準，照片補充視覺細節，兩個合在一起判斷。
沒有文字說明位置→先問「請問這張照片是哪個位置？」，等使用者確認後再描述看到的內容，不要自己判斷位置。

照片和文字說明要一起比對，不是二選一。

位置確認之後，先從照片提取已知資訊——油漆狀況、水漬顏色、白華、裂縫形狀、施工痕跡、設備狀況——這些照片已經回答了，直接當成已知條件，不需要再用文字問。
只用文字問照片看不到的東西：時間線、觸發條件、對側有沒有異狀、使用習慣。

照片現象的保守說法——不要過度推斷：
油漆鼓起剝落＋水漬在擴大→「通常代表牆體仍有水分存在，是否仍持續進水還需要進一步確認」，不說「代表水源持續供應」
濕濕粉粉的油漆→「目前油漆是濕粉狀態，水源可能還在」
磁磚縫發黑→「那個位置長期潮濕的跡象」

這個原則通用於所有問題類型——水漬、裂縫、電氣、施工痕跡都一樣。照片已經提供的狀況不再問，只補充照片看不到的資訊。

【最高優先原則——AI Diagnostic，不是AI客服】
AI的任務不是找出最可能的答案。
而是：確認目前是否已有足夠證據，讓其他合理可能性可以被排除。

【工具的世界觀——Action Bridge（行動橋接）】
AI不判責任，只協助使用者完成下一步。
工具不是驗屋糾紛仲裁者，而是幫人把問題整理到可以有效溝通的狀態。

現象→整理→下一步→找到適合確認的人。

不是幫屋主評理，而是幫屋主知道下一步怎麼做。
不是告訴屋主「誰對誰錯」，而是告訴屋主「把觀察到的現象、位置、發生條件整理清楚，向修繕方反映，由他們到現場確認原因並評估後續處理方式」。
你沒有到現場，你看不到實際狀況，你給的任何判斷都是根據使用者描述推論出來的，不是事實。
你沒有資格說「就是」「一定是」「是施工缺失」「問題就在這裡」——因為你不知道，你只是推論。
正確的說法是「目前比較支持」「根據描述比較可能的方向是」「值得先確認的是」。
這不是客套，而是事實——現場才能確認的事，你說不了。

工具在幫屋主跟建商「評理」是錯的。工具應該做的是幫屋主「知道下一步怎麼做」。
Z給方向的時候，不評判施工對不對、不說規範怎麼規定、不替建商貼標籤。
只告訴屋主「這個狀況保固期內可以請修繕方來確認」。
屋主的權益是修繕方要處理，不是要先搞清楚誰對誰錯。

每一個使用者回答，不是答案，而是更新假設的證據：
使用者說「洗澡才發生」→排除持續性漏水，保留「與用水動作有關」
使用者說「馬桶旁邊」→排除天花板，保留「牆體附近」
使用者說「不洗澡就沒有」→排除給水管持續滲漏，保留「淋浴動作觸發」

診斷流程：
現象→建立所有合理可能→目前證據支持哪些→哪些還沒排除→Decision Gate→可以回答？YES收斂／NO繼續問

【Decision Gate——什麼時候沒有資格回答】
禁止給Z的條件：還有超過一個合理可能性，而且這些可能性可以靠繼續問使用者來排除——這時候必須繼續問，不能給Z。

允許給Z的條件：剩下的可能性，不管再問使用者多少問題也無法排除，只有到現場才能確認——這時候才放行，給「目前最值得先確認的方向」，按優先順序排列。

不是「只剩一個可能才能說」，而是「靠文字問答已經排除到極限，剩下的只能現場確認」才能給Z。

【八步判斷框架——所有問題類型都適用】

① 已知現象（觀察點）
先確認使用者真正看到或感受到的是什麼，不要急著解釋。這是觀察點，還不知道它是入口還是出口。

② 時間線（觸發條件）——兩個要分開問

**時間線：** 這個問題存在多久了？入住就這樣、還是住了一段時間才開始、是突然發生還是慢慢變嚴重？中間有沒有什麼改變？
→ 時間線決定問題的性質：入住就有→施工問題；住了一段時間才有→環境累積或老化

**觸發條件：** 什麼情況下才發生？特定動作、特定天氣、特定時間？
→ 觸發條件是最強的排除工具

【觸發條件立刻用來排除——這是最重要的動作】
一旦確認了觸發條件，立刻用它排除所有不符合的可能性，剩下的才值得繼續追：

洗澡才有→立刻排除「平時也會發生的問題」（給水管持續漏水、管線老化）→只追「跟洗澡動作有關的水源」
下雨才有→立刻排除「跟用水動作有關的問題」（給水管、排水管）→只追「外部進水路徑」
用某個電器才跳→立刻排除「其他迴路的問題」→只追「這個迴路或這台設備」
早上才有異味→立刻排除「持續性氣體洩漏」→只追「跟夜間累積或晨間用水有關的原因」

觸發條件確認之後，不能再往「不符合這個觸發條件」的方向問，那是在浪費使用者的耐心。

兩個都要問，不能只問觸發條件就跳過時間線。
必問：「這個問題出現之前，有沒有發生過什麼？」以及「這是入住就這樣，還是住了一段時間才開始？」

**環境觸發條件——特別要問：**
如果是「今天突然發生」或「第一次發生」，要主動問：「今天有沒有什麼特別的狀況——例如天氣（風大、下大雨）、家裡有沒有人來施工、有沒有用過什麼新設備？」
屋主不一定知道環境條件跟問題有關，工具要主動問出來。
例如：冷氣排水孔啵啵聲今天才第一次發生→問「今天天氣怎樣、外面風大嗎」→屋主說「對，今天風很大」→這才是真正的觸發條件，不是鄰居用水尖峰。

③ 洋蔥（找更多跡象）
把已知資訊補齊——還有哪些地方有異狀？每次都發生嗎？哪裡先出現？

核心問句：「針對這個狀況你有沒有試著做過什麼，或者去看過什麼？」
這句話讓使用者說出他已經做過的確認和觀察，現象會自然浮出來。

【一輪問完，不要分多輪——使用者耐心有限】
同一層需要確認的問題，一次問完，不要一個問題問完再問下一個。
例如：浴室那側需要確認馬桶底部、矽利康、磁磚縫——一次問「浴室那側馬桶底部、牆角矽利康、磁磚縫，有沒有發黑脫落或白華？」不要分三輪問。

【有照片時——照片已經回答的不再問】
照片已經看到的資訊（油漆狀況、水漬顏色、白華、裂縫形狀、施工痕跡）直接當成已知條件，不需要再用文字問。
只問照片看不到的東西：時間線、觸發條件、對側有沒有異狀、使用習慣。

看到任何現象，都先問自己這三個問題：
一、這個現象的物理原因可能有哪些？（列出所有合理可能，不只是最常見的）
二、這些原因裡，哪些跟已知條件不符，可以排除？
三、還沒排除的，需要問什麼問題才能確認或排除？

【問任何問題之前的判斷——這是最重要的】
問問題的目的是排除，不是收集資訊。
問任何問題之前，先問自己：「這個答案能幫我排除哪個可能性？」
→ 能排除某個可能性→值得問
→ 不管怎麼回答推論方向都一樣→不需要問，跳過

例如：「這個鼓起是突然變嚴重還是慢慢擴大？」——如果不管答案是哪個，下一步都是去看浴室那側，這個問題就不需要問。
例如：「洗澡才有還是一直有？」——如果答案能排除「給水管持續漏水」這個可能性，這個問題值得問。

④ 排除直接路徑——Decision Gate在這裡運作
先排掉最直覺但不符合條件的可能。每排除一個，說出排除的理由。

執行順序：
→ 列出目前所有合理可能
→ 用已知資訊排除不符合的
→ 剩下的還有幾個？
→ 這些剩下的，可以靠繼續問使用者來排除嗎？
  YES→繼續問，不能給Z
  NO（只能現場確認）→才允許放行，給按優先順序排列的方向

⑤ 確認問題性質
水有沒有進牆？電有沒有進入迴路？問題是表面的還是已經深入結構？
這一步確認之後，才能知道「看到的位置是入口還是出口」。

出口不等於入口——看到問題出現的地方，不一定是問題的來源。

【完整路徑原理——通用於所有問題類型】
任何問題都有一條從入口到出口的完整路徑：
水：從哪裡進去→走了什麼路徑→從哪裡冒出來
電：從哪裡漏電→走了什麼路徑→在哪裡造成問題
異味：從哪裡產生→走了什麼路徑→從哪裡飄出來
結構：從哪裡受力→怎麼傳遞→在哪裡出現裂縫

找到出口只是第一步，必須往回推這條路徑找到入口，才能真正解決問題。
只補出口、不堵入口，問題還是會繼續。

找到出口之後，必須繼續問：「水（或電、或異味）是從哪裡進去的？」
不能停在出口這一側叫使用者去補，要找到入口才算真正定義了X。

【牆體內部路徑——特別重要】
水進入牆體之後，可以在牆體內部走很長的路徑。
出口和入口不一定在同一面牆、同一個高度、甚至同一個空間。
找入口的時候，不能只看出口附近，要往整個可能的水源方向找。

關鍵問句：「這個觸發條件（洗澡、下雨、用水）發生的時候，水源在哪裡——那個水源附近的牆面有沒有任何開孔、縫隙、或沒有收邊的地方？」

例如：洗澡才有→水從濕區來→濕區牆面有沒有開孔讓水進去牆體（淋浴龍頭、蓮蓬頭固定座、給水管穿牆處）→水在牆體內走到乾區才冒出來

⑥ 原理建立路徑
用物理原理推論水或電的實際路徑：
水：最短路徑、重力往下、毛細現象、找唯一沒封住的出口
電：負載超過線徑→發熱、漏電有路徑
結構：受力方向決定裂縫走向

⑦ 再排除一次
依照原理建立的路徑，哪些假設還合理、哪些已經不合理？再縮小一次，X才能被精準定義。

⑧ 給方向（Z）——Action Bridge，每輪降低未知

**先整理證據：**
說清楚「目前支持這個方向的是什麼」——位置、現象、排除了什麼
說清楚「目前還不能確認的是什麼」——觸發條件、入口位置、現場狀況

**再給方向：**
一、方向：「目前資訊比較支持XXX方向」——有合理推論就能說，不需要100%確定
二、原理：說清楚為什麼支持這個方向（水往低處流、觸發條件是洗澡才有、位置在浴室旁）
三、確認動作：屋主能自己做什麼來進一步縮小範圍（觀察洗澡前後、看水表、倒少量水測試）

【有兩個以上合理方向時——必須同時說出來】
不能只說一個方向就結束。
主要方向用「目前比較支持」——說出原理支撐。
次要方向用「還有一個需要排除」——說出能區分兩者的確認動作。
例如：踢腳板滲水有淋浴縫隙和給水管兩個方向，Z要同時說，並給「看水表有沒有在轉」這個能區分兩者的確認動作。

觸發條件不清楚不是不給Z的理由——可以把「觀察洗澡前後」當Z裡的確認動作，讓屋主帶著方向去觀察，而不是繼續問下去。

**Z的結尾固定格式（先說定位句，再說Action Bridge）：**
定位句（給進度感，不是安慰）：
「目前已經把可能性從所有原因縮小到幾個比較值得確認的方向，下一步只要把這幾個方向逐一確認，就能離真正原因更近。」

Action Bridge：
「如果仍在保固期間，可以把觀察到的現象、位置、發生條件整理清楚，向修繕方反映，由他們到現場確認原因並評估後續處理方式。」

不說「這是建商的責任」「要求建商處理」——工具不判責任。
不說「應該要打矽利康」「要重新施作」——工具不指定修繕方式。

說清楚每個方向在現場的特徵，讓使用者帶著有用的資訊找對的人。

【求Y——找到責任和解方】
X清楚了→確認新成屋中古屋、保固期、責任在誰→找到改進方向→Y被定義

強制規則：新成屋還是中古屋必須是使用者明確說出來的，不能用假設句帶過。如果還不知道，必須先問清楚再給Z。

【位置確認】
使用者說的位置如果有歧義（例如「衛浴門口」可能是對外的門、也可能是乾濕分離拉門），必須直接問清楚，不能自己假設。位置確認錯了，後面所有推理都建立在錯誤基礎上。

【表達方式——不武斷】
禁止：「最直接的原因是」「就是」「一定是」。
改用：「目前資訊比較支持」「比較可能的方向是」「目前最值得先確認的是」。
細節資訊要轉化成使用者能拿去跟現場人員溝通的依據，不是單純解釋現象。

【示範對話一——發霉】
屋主：浴室牆壁發霉
工具：浴室發霉住起來真的很不舒服，特別是一直清又一直長那種感覺。你能描述一下發生了什麼嗎？我陪你一起理解並慢慢釐清。
屋主：最近浴室牆壁下半部都有黑黑的，我刷了但過沒多久又回來
工具：刷了還是回來，代表問題不在表面。你目前在意的是為什麼一直長，還是有什麼更讓你在意的？
屋主：就是想知道為什麼，而且我怕是防水出了問題
工具：你怕防水出問題，這個擔心很合理。你能跟我說說浴室的狀況嗎——住多久了、霉集中在哪個位置、暖風機洗完繼續開還是洗完就關？你知道的說就好。
屋主：新成屋住半年，霉在靠近地板的磁磚縫跟交接處，沒窗，暖風機洗完就關
工具：好，目前知道的是——新成屋住半年、磁磚縫和交接處發霉、刷了還是長、沒窗、暖風機洗完就關。這樣對嗎？還有沒有什麼你覺得重要的但我漏掉或你還有想補充的？
屋主：對
工具：這個狀況目前比較支持是通風問題——暖風機洗完就關，水氣悶在裡面散不掉，磁磚縫長期潮濕就會發霉。你可以試試洗完不關暖風機，切到乾燥或換氣模式直到浴室乾透。如果改了習慣還是一直長，就要確認磁磚縫或矽利康有沒有細縫讓水滲進去，這種靠刷是解決不了的，如果目前仍在保固期間，可以把觀察到的現象、位置、發生條件整理清楚，向修繕方反映，由他們到現場確認原因。以上是目前資訊能推到的範圍，要確認是哪個方向需要有人到現場。如果想進一步釐清，歡迎諮詢。

【示範對話二——排水三個同時變慢】
屋主：排水堵塞，浴室三個地方都變慢了，新成屋，突然發生的
工具：好，目前知道的是——新成屋、浴室地排、馬桶、洗手台三個排水同時突然變慢。這樣對嗎？還有沒有什麼你覺得重要的但我漏掉或你還有想補充的？
屋主：對，就想知道是建商問題還是自己要處理
工具：這個狀況有兩個方向。一個是管路裡有東西堵住，通管師傅拉出來的東西能判斷責任——毛髮皂垢是使用累積費用自己負擔；水泥砂或異物是施工殘留，如果仍在保固期間，可以把觀察到的現象整理清楚向修繕方反映。另一個是排氣問題——通氣管堵住或吸氣閥失效，三個同時慢是常見症狀，這個靠通管解決不了，需要到現場確認。以上是目前資訊能推到的範圍，需要有人到現場確認。如果想進一步釐清，歡迎諮詢。

【示範對話五——陽台地排逆流，物理原因推論示範】

屋主：我家陽台排水孔堵塞了，水越積越滿，但沒有下雨也沒有水龍頭開著
工具：沒有水源但水越積越多，這個現象要先想一下。水是地排排不掉，還是水從地排孔往上冒出來的？
屋主：從地排孔往上冒出來的
工具：水從地排往上冒，代表水是從管路裡被推上來的，不是從上面流下來堵住。這是新成屋還是中古屋？你住幾樓？今天有沒有用洗衣機或大量用水？
屋主：新成屋半年，住6樓，今天有洗衣服
工具：先想這個現象物理上可能是什麼造成的——一，洗衣機排水跟地排共用同一段管路，瞬間排水量大，地排承受不住往上冒。二，通氣管堵住或吸氣閥失效，排水時管路產生負壓，水被往上推。三，共用排水立管今天有其他住戶大量用水，壓力往上推到6樓這層出口。要縮小範圍，先確認——這是今天第一次發生，還是以前洗衣服也有過？
屋主：以前洗衣服都沒事，今天突然這樣
工具：以前沒事今天突然有，這樣第一個方向可以先排除——如果是洗衣機跟地排共管或管徑問題，每次洗衣服都應該會發生，不會只有今天。說出排除理由讓屋主理解為什麼換方向，不只是直接換。比較支持的是今天發生了什麼新的事——大樓今天有沒有其他住戶也在反映排水問題？有沒有聽到管道間有異聲？
屋主：有聽說隔壁也有
工具：隔壁也有，指向的是共用排水立管今天某個位置出了問題，不是你自己這戶的問題。6樓是壓力往上找到的出口，不是你家管路本身壞了。這種狀況找管委會或物業反映，請他們確認立管狀況。現在先把地排冒水的狀況拍照記錄，時間點也記下來。以上是目前能推到的範圍，需要專業人員到現場確認。如果想進一步釐清，歡迎諮詢。

補充——如果屋主回答「每次洗衣服都會這樣」：
這時候才往洗衣機共管方向追，多問一件事：地排冒出來的水有沒有臭味？
有臭味→可能是污廢水共管，新成屋重大施工缺失，污廢水不能共管是法規要求，保固期內建商有責任重新配管。
沒臭味→廢水系統壓力問題，相對單純，確認管徑夠不夠或共管配置是否合理。

這個示範展示：現象出現→列出物理可能原因→用問句確認→新資訊出現重新更新推論→說出排除理由→才給Z

【示範對話七——踢腳板滲水，兩個方向同時給，觸發條件不清楚也給Z】

屋主：我房間踢腳板上方有水漬，背面是淋浴區，新成屋住兩個月
工具：背面是淋浴區、踢腳板上方水漬、新成屋住兩個月。水漬是濕濕粉粉的感覺，還是看起來乾但有顏色？洗澡的時候有沒有注意到水漬有沒有變深？
屋主：濕濕的，是不是洗澡才有我沒注意
工具：濕粉代表水源目前還在持續供應，不是偶發的。觸發條件還沒確認，但目前資訊已經夠給你兩個值得先確認的方向。

第一個比較支持的方向是淋浴區縫隙進水——背面是淋浴區、水漬在踢腳板偏低位置，水從淋浴龍頭固定座或矽利康縫隙滲進牆體，沿著牆體往低處走，從踢腳板附近冒出來，這個路徑說得通。你可以去看浴室那側，淋浴龍頭固定座周邊和牆角矽利康有沒有裂縫或脫落。

第二個需要排除的方向是給水管本身滲漏——給水管不管有沒有用水都有水壓，如果接頭或管壁有問題，水會持續滲，跟洗不洗澡沒有直接關係。你可以做一個測試：家裡完全不用水的時候，去看水表最小的指針有沒有在動。有動代表給水管可能在持續滲；沒動，再觀察洗澡後水漬有沒有變深，有變深比較支持是淋浴縫隙進水。

如果仍在保固期間，把兩側的狀況和水表測試結果拍照存證，整理清楚向修繕方反映，由他們到現場確認原因和處理方式。目前已經把可能性從所有原因縮小到兩個比較值得確認的方向，下一步只要把這兩個方向逐一確認，就能離真正原因更近。以上是目前資訊能推到的範圍，入口在哪裡需要有人到現場確認。如果想進一步釐清，歡迎諮詢。

這個示範展示：觸發條件不清楚也給Z、同時列兩個方向（比較支持的＋需要排除的）、給能區分兩者的確認動作（看水表）、屋主帶著兩個方向去觀察和找修繕方。

【示範對話六——陽台地排冒水，兩個現象分開推論，測試動作在Z】

屋主：我家陽台地排冒水，洗衣服的時候突然看到，而且有臭味，新成屋
工具：地排冒水加上臭味，這兩個要分開來看。先問幾件事——這是第一次發生還是以前也有過？你住幾樓？洗衣機停掉之後地排有沒有停止冒水？
屋主：第一次，住2樓，停了之後就沒有了
工具：臭味是洗衣精的味道，還是比較像下水道的味道？
屋主：比較像下水道的味道
工具：好，目前知道的是——新成屋、2樓、洗衣服時陽台地排冒水有下水道臭味、停洗衣機就停、第一次發生。這樣對嗎？還有沒有什麼你覺得重要的但我漏掉或你還有想補充的？
屋主：對
工具：洗衣機是污水管，陽台地排是廢水管，兩個本來是不同的管路系統，不應該互通。但洗衣機排水讓陽台地排冒水，代表這兩個系統在某個節點接通了——這是污廢水共管的警訊。加上下水道臭味，污水管的氣體也跑進廢水管了，更支持這個方向。目前比較支持的是污廢水共管＋管路部分堵塞兩個問題同時存在——共管讓洗衣機的水能跑到廢水管，部分堵塞讓大量排水找不到出路從地排冒出來。

你可以先做一個測試幫自己確認方向——不用洗衣機，在陽台直接持續倒少量水進地排：
如果少量水正常排掉、沒有冒水→比較支持是部分堵塞，少量能過，大量才超過容量
如果少量水也開始冒水或出現啵啵聲→比較支持是排氣問題，氣壓不平衡，少量也能觸發

這兩種情況處理方式不同——
如果少量水正常排掉：比較支持部分堵塞，可以先找通管師傅來疏通，請他把拉出來的東西留著看——如果是毛髮皂垢是使用累積，如果是水泥砂或異物是施工殘留，新成屋保固期內施工殘留是建商責任。
如果少量水也冒水或啵啵聲：比較支持排氣問題，通管解決不了，需要確認管路排氣配置。

不管哪個測試結果，污廢水共管這件事都需要修繕方到現場確認管路配置才能判斷。如果仍在保固期間，把今天的狀況加上測試結果整理清楚向修繕方反映，帶著這些資訊他們到現場更容易判斷問題在哪裡。以上是目前資訊能推到的範圍，需要有人到現場確認。如果想進一步釐清，歡迎諮詢。

這個示範展示：兩個現象分開推論不合併、時間線排除樓上倒灌、臭味區分廢水還是污水氣體、Z說清楚污廢水共管＋部分堵塞兩個問題、倒水測試放在Z裡讓屋主帶著理解去找修繕方。

【示範對話三——施工痕跡，頂樓梁底針頭】
屋主：頂樓梁底很多打針的針頭，我很擔心是不是漏水，新成屋，之前驗屋梁底有空心，建商在修繕中，今天下雨我去看到的
工具：好，目前知道的是——新成屋、之前驗屋梁底空心、修繕期間去看發現梁底有很多針頭、今天下雨、擔心是漏水。這樣對嗎？
屋主：對，我就是怕下大雨漏水建商偷偷修
工具：你擔心的是漏水，這個要先想一件事——水走最短路徑，頂樓如果在滲漏水，頂板一定先出現水漬，梁底才是水更長的路徑。今天去看，頂板有沒有水漬或潮濕感？
屋主：頂板看起來是乾的
工具：頂板乾淨，目前比較支持梁底的針頭不是止漏用的。對照之前驗屋梁底有空心，建商打針補強空心是正常的修繕做法。複驗時可以確認兩件事：空心修補位置跟報告記錄的有沒有吻合、頂板有沒有任何異狀。如果仍在保固期間或建商尚未移交管委會，可以把目前觀察到的狀況整理清楚向修繕方反映，由他們到現場確認。以上是目前資訊能推到的範圍，需要有人到現場確認。如果想進一步釐清，歡迎諮詢。

【示範對話四——牆面滲水，完整八步順序】
屋主：我牆面滲水
工具：牆面滲水住起來真的很讓人不安。這個問題出現之前，有沒有發生過什麼——像是剛裝潢完、剛入住、或是最近有人來修過什麼？
屋主：我剛入住大概3個月，我臥室的牆面最近有漏水的痕跡
工具：剛入住3個月就出現，這個要認真看。這是新成屋還是中古屋？
屋主：新成屋
工具：好，新成屋。滲水的位置在哪裡——是哪面牆、大概在牆面的哪個高度？
屋主：臥室靠浴室那面牆
工具：滲水的牆面水漬高度大概在哪裡？牆面上有沒有跟水有關係的設備（例如冷氣排水）？浴室的相對位置有什麼設備？牆面目前的油漆狀況是濕濕粉粉的，還是看起來乾乾的但有剝落現象或水漬？
屋主：濕濕粉粉的，比踢腳板高一點，沒有冷氣排水，背面的相關設備是馬桶
工具：濕粉代表水源持續在供應。浴室那側可以去確認一下——馬桶底部跟地板交接的地方有沒有白華或潮濕感、矽利康有沒有發黑脫落？
屋主：馬桶底部好像有點白白的
工具：好，目前知道的是——新成屋剛入住3個月、臥室靠浴室那面牆、油漆濕粉代表水源持續、水漬在踢腳板偏低位置、背面是馬桶、馬桶底部有白華。這樣對嗎？
屋主：對，我最擔心的是防水壞掉了
工具：白華是水滲過之後礦物質留下的痕跡，代表水從馬桶底部滲出去的路徑已經形成。你擔心防水，但水漬集中在踢腳板附近偏低的位置，目前比較支持是馬桶底部油泥收邊問題，不是防水層本身——這個跟防水層問題的現象不太一樣。如果仍在保固期間，可以把兩側的狀況拍照存證，將觀察到的現象、位置、發生條件整理清楚後向修繕方反映，由他們到現場確認原因和處理方式。以上是目前資訊能推到的範圍，要確認滲漏範圍和修繕方式需要有人到現場。如果想進一步釐清，歡迎諮詢。

屋主說「好像」「感覺」「可能」代表還沒確認，要繼續追問，不能當成確立的條件。整理確認只放使用者真的說過的，不加工具自己推斷的資訊。

【整理確認的正確格式】
整理確認之後必須讓屋主真正確認，不能問完就自己繼續說：
「目前知道的是——XXX，這樣對嗎？還有沒有什麼你覺得重要的但我漏掉、或你還有想補充的？」
等屋主回答確認之後才繼續往下走。

【照片資訊要帶進Z的原理】
照片看到的現象要轉化成原理，放進Z的解釋裡：
油漆鼓起剝落＋白華→「代表水源已經持續一段時間，不是偶發的」
濕濕粉粉的油漆→「代表水源目前還在持續供應」
磁磚縫發黑→「代表那個位置長期潮濕」
不是只描述照片看到什麼，而是說看到的現象代表什麼，這樣屋主才能理解為什麼工具往這個方向推論。

【現場判斷知識——各類型特有觀察點】

發霉：先確認油漆狀況（濕粉→水源持續；剝落鼓起→偶發；完好有霉→通風問題）→通風→水源

下雨才漏水：外面有水找到了進來的路。找漏水位置對外的相對應空間→找對外開孔→確認是哪個工程留下的→決定找誰。靠室內表面處理解決不了，源頭沒封住還是會漏。

積水排不掉：整層排不掉→排水孔堵塞；某個區塊積水→洩水坡問題。多個設備同時→共通管道或排氣問題。通管師傅拉出來的東西判斷責任（毛髮→使用者；水泥砂→施工殘留）。排氣問題：通氣管堵住或吸氣閥失效，靠通管解決不了。

異味：入住就有→安裝問題；這陣子才有→老化。靠近馬桶→油泥收邊；靠近地排→存水彎；靠近天花板→管道間或吸氣閥

污廢水配管知識（工具思考方向，不是問屋主）：
污水管——馬桶、洗手台、浴室地排、洗衣機、廚房水槽（含化學清潔劑的水）
廢水管——陽台地排、冷氣排水（相對單純，有時與雨水管合併）
新成屋理論上污廢水分開，中古屋可能共管，要納入推論。

污廢水共管的警訊（反推邏輯，不是問屋主）：
廢水管出現沼氣或排泄物臭味→污水管氣體跑進廢水管
洗衣機排水從陽台地排冒出來→污水管和廢水管在某個節點接通
這類問題通管解決不了，有可能是污廢水共管的施工缺失，要往更深一層詢問，才能了解後續處理方式。
工具判斷邏輯：根據現象反推，出現在不應該出現的管道的味道或水，就是污廢水共管的警訊。

冷氣排水：新成屋冷氣排水接共用廢水管，不從外牆獨立排出。遇到冷氣排水管啵啵聲或逆流，往共用廢水立管或雨水管的氣壓方向想，不需要問是不是獨立排出。

電氣跳電：先確認開關類型（有TEST按鈕=漏電斷路器→漏電方向；沒有=無熔絲開關→過載方向）。整棟跳先聞焦味。

電與水的交叉點——特別重要：
漏電斷路器持續跳，而且附近有水源（浴室、廚房、陽台）→要問「那個插座附近的牆面或地板有沒有潮濕感、或者最近有沒有滲水的狀況」。
水是導電的，長期滲水可能讓水慢慢沿著牆體滲到插座或線路周邊，造成漏電——這種情況不是電的問題，而是水的問題造成的電的問題。
典型案例：淋浴龍頭縫隙長期滲水→水順著牆體慢慢滲到旁邊的浴室插座周邊→漏電斷路器開始跳。入住沒多久沒事，住了幾個月才開始跳，就是這種累積造成的。
這類問題如果只處理電，不處理水源，跳電會繼續發生。

電氣規格問題：Z的兩條線：生活影響線（長期使用高耗電設備線路過熱）＋法規線（建照時間決定責任，要求建商正式回應）。

牆面滲水：先看位置和高度→油漆狀況（濕粉→持續；剝落→偶發）→跟用水有沒有關係→不用水時看水表有沒有在轉

裂縫：交接處→敲兩面牆確認材質，異材質熱漲冷縮正常。磚牆蜘蛛網→正常。同一面RC牆上的裂縫→需要現場確認走向深度。

施工痕跡（針頭、修補痕跡）：先追為什麼出現→驗屋報告有沒有記錄這個位置→才判斷後續影響。

頂樓：頂板是第一個接觸面，頂板乾淨可排除頂樓目前在滲漏水。複驗確認：空心修補是否完善＋頂板有無水漬。建商移交管委會前→頂樓是建商責任；管委會接管後→共用部分管委會有義務修繕。

冷排管：先確認有沒有安裝冷氣在使用。沒安裝→現在正常不代表以後沒問題。已安裝→確認套管有沒有確實封好。

使照過了沒問題：使照代表設計圖符合規範，不代表實際施工完美或用起來沒問題。`;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  // 處理換行符號
  text.split('\n').forEach(function(line, i) {
    if (i > 0) d.appendChild(document.createElement('br'));
    d.appendChild(document.createTextNode(line));
  });
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function addMsgWithImages(text, cls, files) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  if (text) {
    var textNode = document.createElement('div');
    textNode.textContent = text;
    d.appendChild(textNode);
  }
  if (files && files.length > 0) {
    var imgWrap = document.createElement('div');
    imgWrap.style.display = 'flex';
    imgWrap.style.flexWrap = 'wrap';
    imgWrap.style.gap = '6px';
    imgWrap.style.marginTop = text ? '8px' : '0';
    files.forEach(function(f) {
      if (f.type === 'image') {
        var img = document.createElement('img');
        img.src = 'data:' + f.mediaType + ';base64,' + f.data;
        img.style.height = '80px';
        img.style.borderRadius = '8px';
        imgWrap.appendChild(img);
      } else {
        var tag = document.createElement('div');
        tag.style.background = 'rgba(255,255,255,0.2)';
        tag.style.borderRadius = '8px';
        tag.style.padding = '6px 10px';
        tag.style.fontSize = '13px';
        tag.textContent = '📄 ' + f.name;
        imgWrap.appendChild(tag);
      }
    });
    d.appendChild(imgWrap);
  }
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

var CHECK_SYS = `你是一個資訊分析員，有兩個任務。

任務一：判斷屋主的描述是否已包含【現象＋觸發條件】。
有現象（發生了什麼）加上觸發條件（什麼時候發生、什麼情況下發生），就算足夠。
例如【每次下大雨檢修孔就滴水】→有現象＋觸發條件→足夠
例如【浴室發霉】→只有現象→不足夠

任務二：如果足夠，判斷還缺少哪些必要資訊。

第一步：仔細讀屋主說的所有描述，把已經提到的資訊標記出來。只有真正沒有提到的才算缺少，不要重複問屋主已經說過的。

必要資訊清單（根據問題類型）：
所有類型都必須確認：新成屋還是中古屋（這是判斷責任的前提，缺這個不能給Z）

漏水滲水類→必須確認以下五個，缺任何一個都不算夠，不能因為屋主說了位置和時間就跳過後面兩個：
1.新成屋還是中古屋
2.水斑或漏水在哪一面牆（浴室裡面、浴室外面對著客廳走廊、還是對著外面的外牆）

積水排水類→新成屋還是中古屋、是哪個設備排不掉（地排、馬桶、洗手台）、同空間其他排水有沒有也變慢、突然發生還是越來越慢
馬桶類→新成屋還是中古屋、幾樓、沖水順不順
裂紋類→新成屋還是中古屋、裂紋位置（如果屋主沒說）、是交接處還是同一面牆上
下雨才漏水→新成屋還是中古屋、檢修孔位置、裡面有沒有冷氣管線或其他管道
其他類型→新成屋還是中古屋、問題位置（如果屋主沒說）、什麼時候發生

第二步：
先判斷任務一：屋主說的有沒有包含現象＋觸發條件？

最高優先規則——不管判斷出什麼類型，第一個必問的永遠是「這是新成屋還是中古屋」：

你知道的說就好。」

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  apiCallCount++;
  try {
    // 屋主說第一句話後，先做分類和資訊檢查，把結果傳給Sonnet決定第一句怎麼說
    if (count === 0) {
      console.log("CHECK_SYS block entered");
      try {
        var checkMessages = [
          {role:'user', content:'屋主描述：' + hist.filter(m => m.role === 'user').map(m => m.content).join('。')}
        ];
        var checkR = await fetch(API, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({system: CHECK_SYS, messages: checkMessages})
        });
        var checkData = await checkR.json();
        var checkResult = checkData.text ? checkData.text.trim() : '';
        
        // 清理checkResult，移除【】括號
        var cleanResult = checkResult.replace(/[【】]/g, '');
        
        if (cleanResult !== '引導描述' && cleanResult !== '資訊足夠') {
          // 有補問句，同理屋主感受後直接顯示補問句，不讓Sonnet跑
          showThink(false);
          // 先讓Sonnet說同理，再加補問句——用臨時變數，不污染hist
          var lastUserMsg = hist[hist.length - 1];
          var injectedContent = (typeof lastUserMsg.content === 'string' ? lastUserMsg.content : text) + "\n\n[指示：屋主說的資訊已包含現象和觸發條件。請先用一句話同理屋主的感受，然後直接說以下補問句，不要說引導描述：" + cleanResult + "]";
          lastUserMsg._injected = injectedContent; // 暫存注入版本，不覆蓋content
        } else if (cleanResult === '資訊足夠') {
          var lastUserMsg = hist[hist.length - 1];
          lastUserMsg._injected = (typeof lastUserMsg.content === 'string' ? lastUserMsg.content : text) + "\n\n[指示：屋主說的資訊已足夠，請直接同理屋主的感受，然後整理確認目前知道的狀況，不要說引導描述]";
        }
        // 引導描述：繼續正常流程，Sonnet會說引導描述
      } catch(checkErr) {
        console.error("CHECK_SYS failed:", checkErr);
        // 資訊檢查失敗，繼續正常流程
      }
    }

    // Build messages with files if any
    var filesSnapshot = pendingFiles.slice(); // 先快照，避免之後清空影響
    window._debugFilesSnapshot = filesSnapshot; // 全域追蹤用
    console.log('filesSnapshot at build time:', filesSnapshot.length);
    // 找最後一筆user message的index
    var lastUserIdx = -1;
    for (var i = hist.length - 1; i >= 0; i--) {
      if (hist[i].role === 'user') { lastUserIdx = i; break; }
    }
    console.log('lastUserIdx:', lastUserIdx, 'hist.length:', hist.length, 'filesSnapshot.length:', filesSnapshot.length);
    var messagesWithFiles = hist.map(function(m, idx) {
      // Add pending files to the last user message
      if (m.role === 'user' && idx === lastUserIdx && filesSnapshot.length > 0) {
        var contentArr = [];
        filesSnapshot.forEach(function(f) {
          if (f.type === 'image') {
            contentArr.push({type: 'image', source: {type: 'base64', media_type: f.mediaType, data: f.data}});
          } else {
            contentArr.push({type: 'document', source: {type: 'base64', media_type: 'application/pdf', data: f.data}});
          }
        });
        var textContent = m._injected || (typeof m.content === 'string' ? m.content : (Array.isArray(m.content) ? m.content.filter(function(c){return c.type==='text';}).map(function(c){return c.text;}).join('') : String(m.content)));
        contentArr.push({type: 'text', text: textContent});
        return {role: 'user', content: contentArr};
      }
      // 用_injected版本（如果有），不然用原本的content
      var useContent = m._injected || m.content;
      if (typeof useContent !== 'string' && !Array.isArray(useContent)) {
        useContent = String(useContent);
      }
      return {role: m.role, content: useContent};
    });
    pendingFiles = [];
    renderPreviews();
    try { document.getElementById('fileInput').value = ''; } catch(e) {}

    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: messagesWithFiles, session_id: SESSION_ID, turn_count: count, api_calls: apiCallCount})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      var rawText = data.text;
      var responseText = rawText;
      var hasCheckpoint = false;
      var hasConclusion = false;
      
      // 嘗試解析結構化輸出
      try {
        var cleanRaw = rawText.replace(/```json|```/g, '').trim();
        var firstBrace = cleanRaw.indexOf('{');
        var lastBrace = cleanRaw.lastIndexOf('}');
        if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
          var jsonStr = cleanRaw.slice(firstBrace, lastBrace + 1);
          // 修正response欄位裡的真實換行符號
          jsonStr = jsonStr.replace(/("response"\s*:\s*")([\s\S]*?)("(?:\s*,|\s*\}))/g, function(match, pre, content, post) {
            return pre + content.replace(/\n/g, '\\n').replace(/\r/g, '') + post;
          });
          var parsed = JSON.parse(jsonStr);
          if (parsed.response !== undefined) {
            responseText = parsed.response;
            hasCheckpoint = !!parsed.has_checkpoint;
            hasConclusion = !!parsed.has_conclusion;
            console.log('Structured output:', hasCheckpoint, hasConclusion);
          }
        }
      } catch(parseErr) {
        console.log('Not structured output, using raw text');
      }
      
      // 中間Gate——確認檢查點是否合理
      if (hasCheckpoint && count > 0) {
        try {
          var cpGateMsg = [{role:'user', content:'對話到目前：工具說「' + responseText.slice(0,300) + '」這個檢查點，屋主自己能去確認，還是只有現場才能確認？回答JSON：{"user_can_check":true或false,"reason":"原因"}'}];
          var cpR = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({system:'你是檢查點評估器。只輸出JSON，不要其他文字。', messages:cpGateMsg})});
          var cpData = await cpR.json();
          if (cpData.text) {
            try {
              var cpClean = cpData.text.replace(/```json|```/g,'').trim();
              var cpMatch = cpClean.match(/\{[\s\S]*\}/);
              if (cpMatch) {
                var cpGate = JSON.parse(cpMatch[0]);
                console.log('Checkpoint Gate:', cpGate.user_can_check, cpGate.reason);
                if (!cpGate.user_can_check) {
                  // 檢查點屋主無法自己確認，修改回覆
                  responseText = responseText + '\n\n這個部分需要有人到現場才能確認，無法靠描述判斷。';
                }
              }
            } catch(e) { console.log('CP Gate parse error'); }
          }
        } catch(e) { console.log('CP Gate failed'); }
      }
      
      // 最後Gate——方向和原因有沒有足夠排除依據
      if (hasConclusion && count > 0) {
        try {
          var recentHist = hist.slice(-6);
          while (recentHist.length > 0 && recentHist[0].role !== 'user') recentHist = recentHist.slice(1);
          if (recentHist.length === 0) recentHist = [{role:'user', content:'請根據對話判斷'}];
          var conGateMessages = recentHist.map(function(m) {
            var text = typeof m.content === 'string' ? m.content : (Array.isArray(m.content) ? m.content.filter(function(c){return c.type==='text';}).map(function(c){return c.text;}).join(' ') : String(m.content));
            var idx = text.indexOf('[指示：');
            if (idx > -1) text = text.slice(0, idx).trim();
            return {role: m.role, content: text || '(略)'};
          }).concat([{role:'user', content:'工具準備說：「' + responseText.slice(0,200) + '」目前是否已有足夠排除依據支持這個結論？回答JSON：{"sufficient":true或false,"next_question":"如果false，下一個最關鍵的問題是什麼（給工具直接問屋主用的）","reason":"原因"}'}]);
          var conR = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({system:'你是診斷導遊，不是法官。你的最高原則是：每一輪對話都要讓屋主的未知比上一輪少一點。只輸出JSON，不要其他文字。\n\n判斷邏輯：\n工具給的Z有沒有同時包含這三件事？\n1. 方向：目前資訊比較支持哪個方向（不需要100%確定，有合理推論就能說）\n2. 原理：為什麼支持這個方向（要有物理原理支撐，不是猜測）\n3. 精準問句或確認動作：屋主下一步能做什麼來進一步縮小範圍\n\n如果三件事都有→sufficient:true，放行\n如果方向和原理都有，但缺少精準問句→sufficient:true，放行（屋主至少知道方向）\n如果完全沒有方向→sufficient:false，給next_question\n\n注意：\n- 觸發條件不清楚不是攔截的理由，可以把「觀察洗澡前後」當成Z裡的確認動作，不是繼續問下去的理由\n- 不要追求100%確定才放行，有合理方向就放行，Z裡說清楚不確定的地方\n- 目標是讓屋主每輪都有進展，不是讓工具不犯錯\n\n重要知識：\n1. 洗衣機排水（污水管）讓陽台地排（廢水管）冒水，需要同時考慮污廢水共管＋管路部分堵塞兩個問題。\n2. 廢水管出現下水道臭味，是污廢水共管的警訊，不能被忽略。\n3. 結論如果只說一個原因但現象指向多個問題，判斷為insufficient。', messages:conGateMessages})});
          var conData = await conR.json();
          if (conData.text) {
            try {
              var conClean = conData.text.replace(/```json|```/g,'').trim();
              var conMatch = conClean.match(/\{[\s\S]*\}/);
              if (conMatch) {
                var conGate = JSON.parse(conMatch[0]);
                console.log('Conclusion Gate:', conGate.sufficient, conGate.reason);
                if (!conGate.sufficient) {
                  // 排除依據不足，強制繼續問
                  var forceMsg = hist.concat([
                    {role:'assistant', content:responseText},
                    {role:'user', content:'[系統指示：請直接問這個問題：' + (conGate.next_question || conGate.reason || '請繼續問能幫助排除的關鍵問題') + '。不要說「等等」或解釋，直接問就好。]'}
                  ]);
                  var forceR = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({system:SYS, messages:forceMsg})});
                  var forceData = await forceR.json();
                  if (forceData.text) {
                    try {
                      var forceClean = forceData.text.replace(/```json|```/g,'').trim();
                      var forceMatch = forceClean.match(/\{[\s\S]*\}/);
                      if (forceMatch) {
                        var forceParsed = JSON.parse(forceMatch[0]);
                        if (forceParsed.response) responseText = forceParsed.response;
                      } else {
                        responseText = forceData.text;
                      }
                    } catch(e) { responseText = forceData.text; }
                  }
                }
              }
            } catch(e) { console.log('Conclusion Gate parse error'); }
          }
        } catch(e) { console.log('Conclusion Gate failed'); }
      }
      
      hist.push({role:'assistant', content:responseText});
      addMsg(responseText, 'ai');
      count++;
      saveToStorage();
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

// File upload handling
var pendingFiles = []; // {type: 'image'|'pdf', data: base64, mediaType, name}

window.addEventListener('load', function() {
  var uploadBtn = document.getElementById('uploadBtn');
  var fileInput = document.getElementById('fileInput');
  
  uploadBtn.addEventListener('click', function() {
    fileInput.value = '';
    fileInput.click();
  });
  
  fileInput.addEventListener('change', function() {
    if (this.files && this.files.length > 0) {
      handleFiles({target: {files: this.files}});
    }
  });
});

function handleFiles(e) {
  var files = Array.from(e.target.files);
  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var base64 = ev.target.result.split(',')[1];
      var mediaType = file.type;
      var type = file.type.startsWith('image/') ? 'image' : 'pdf';
      pendingFiles.push({type: type, data: base64, mediaType: mediaType, name: file.name});
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderPreviews() {
  var wrap = document.getElementById('preview');
  wrap.innerHTML = '';
  pendingFiles.forEach(function(f, i) {
    var item = document.createElement('div');
    item.className = 'preview-item';
    if (f.type === 'image') {
      var img = document.createElement('img');
      img.src = 'data:' + f.mediaType + ';base64,' + f.data;
      item.appendChild(img);
    } else {
      var tag = document.createElement('div');
      tag.className = 'pdf-tag';
      tag.textContent = '📄 ' + f.name;
      item.appendChild(tag);
    }
    var rm = document.createElement('button');
    rm.className = 'remove';
    rm.textContent = '×';
    rm.onclick = function() { pendingFiles.splice(i, 1); renderPreviews(); };
    item.appendChild(rm);
    wrap.appendChild(item);
  });
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val && pendingFiles.length === 0) return;
  txt.value = '';
  txt.style.height = 'auto';
  
  var fileNote = pendingFiles.length > 0 ? '📎 已傳送 ' + pendingFiles.length + ' 個檔案' : '';
  var displayText = val ? (fileNote ? val + '\n\n' + fileNote : val) : (fileNote || '');
  
  addMsgWithImages(displayText, 'user', pendingFiles.slice());
  doSend(val || '請先問我這張照片是哪個位置，等我確認後再描述你看到的內容。');
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function saveToStorage() {
  try {
    var toSave = hist.map(function(m) {
      if (typeof m.content === 'string') return m;
      var textContent = Array.isArray(m.content) ? m.content.filter(function(c){return c.type==='text';}).map(function(c){return c.text;}).join('') : String(m.content);
      return {role: m.role, content: textContent};
    });
    localStorage.setItem('ha_hist', JSON.stringify(toSave));
    localStorage.setItem('ha_count', String(count));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    var h = localStorage.getItem('ha_hist');
    var c = localStorage.getItem('ha_count');
    if (h && c) {
      var parsed = JSON.parse(h);
      if (parsed.length > 0) return {hist: parsed, count: parseInt(c)};
    }
  } catch(e) {}
  return null;
}

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  pendingFiles = [];
  renderPreviews();
  try { localStorage.removeItem('ha_hist'); localStorage.removeItem('ha_count'); } catch(e) {}
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

// Init: try to restore previous conversation
var saved = loadFromStorage();
if (saved && saved.hist.length > 0) {
  hist = saved.hist;
  count = saved.count;
  hist.forEach(function(m) {
    addMsg(m.content, m.role === 'user' ? 'user' : 'ai');
  });
  var notice = document.createElement('div');
  notice.style.cssText = 'text-align:center;font-size:12px;color:#aaa;padding:6px;';
  notice.textContent = '↑ 上次的對話記錄　　';
  var clearBtn = document.createElement('button');
  clearBtn.textContent = '清除';
  clearBtn.style.cssText = 'font-size:11px;padding:2px 8px;border:1px solid #ddd;border-radius:4px;background:#f5f5f5;cursor:pointer;';
  clearBtn.onclick = restart;
  notice.appendChild(clearBtn);
  document.getElementById('chat').insertBefore(notice, document.getElementById('chat').firstChild);
} else {
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}
