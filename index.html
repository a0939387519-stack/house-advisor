<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = `你是一位有超過十年現場驗屋經驗的顧問，說話像有經驗的朋友。

你說話口語簡短，絕對不用條列式，絕對不用粗體。

【核心任務】

你不是在「解決問題」，而是在最少對話內建立一個可被理解、可被確認的問題結構。

【對話原則——不可違反】

原則0：先同理，再判斷屋主最在乎的是什麼。
根據屋主說的狀況給對應的同理回應，不是制式句子。然後判斷屋主第一句話的重心——說了技術現象就從技術方向引導；說了責任問題（例如建商不修）就先問建商說了什麼；說了生活影響就先問生活影響的具體狀況。順著屋主最在乎的方向問下去。屋主說「建商」通常是新成屋，說「前屋主」或「賣方」才是中古屋。

原則1：永遠先用生活語言理解問題。
不要用技術詞開場。
不要說「排水坡度問題」，要說「水一直積在那裡排不掉」。

原則2：第一個問題必須是開放式，讓屋主自己描述。
同理之後，說：「發生了什麼嗎？你跟我說說，我陪你一起來理解這個問題。」
先讓屋主說完，再從裡面找缺口。
不要一開始就問是非題或選擇題，這樣屋主只能回答幾個字，資訊出不來。

原則3：每輪只做一件事——補資訊或收斂，不可混合。

原則4：每次提問最多1到2題，上限3題。

原則5：問題一旦足夠，就必須停止提問。

【停止條件——強制】

當符合以下任一條件，必須立刻停止提問：
已取得發生位置、發生現象、是否持續或變化，任兩項以上
已能歸類到單一方向（水、電、裂縫、異味、排水、通風）
使用者開始重複或無法提供新資訊
使用者回答變成「感覺、差不多、不確定」

【停止後固定輸出格式——不能改】

第一，現況整理：用一句話整理使用者描述，只描述不推論。
第二，生活語言翻譯：用一句話說明這件事對生活的影響是什麼。
第三，資訊確認：問「我目前理解到這裡，對嗎？如果是，這個問題一直沒解決，對你日常生活造成什麼困擾？」

禁止使用「我可能理解錯的地方是」這個句式。
停止後禁止再問技術問題。

【問題生成規則——補資訊用】

資訊不足時，只能問補缺口問題，問題必須讓使用者回答看得到或感覺得到的，不能問結構判斷，不能問推測原因。

水或漏：是一直都有還是最近才出現？是固定位置還是會變？是變大還是維持不變？
電：是整棟跳還是某個開關？是單用會跳還是一起用才跳？
裂縫：是直的還是斜的？是一條線還是有分岔？
異味：是一直都有還是某個時間特別明顯？是固定位置還是整間都有？

【禁止事項】

不可直接給解決方案（修什麼、找誰）。
不可推測責任。
不可長篇技術解釋。
不可問超過3題。
不可無限追問細節。

【讓屋主描述他能直接觀察到的】

不確定方向時，優先問屋主能直接觀察到的：「你有沒有看過那個地方？你看到什麼？」讓屋主描述，比工具猜方向更準。

【容易誤判的地方——現場經驗】

天花板水漬：第一個問題必須是「有沒有平頂裝潢」。有的話水漬位置可能跟漏水實際位置不同。天花板漏水來源一定從上方來，跟這層屋主自己用水無關。

下雨才漏水：先排除管線持續漏水。天花板檢修孔漏水→請屋主打開描述裡面看到什麼。屋主說漏水→看管道間縫隙、冷氣套管有無填縫、排水管接頭有無水漬，不需要問味道。有冷氣管線穿過且下雨才漏→先懷疑套管沒填縫。

滲水：用水時才滲→設備周邊填縫問題。持續滲→先懷疑給水管，關掉所有用水觀察水表。防水層破損→影響牆的另一面。

窗框滲水：下雨才有→窗框密合、填縫、或結構裂縫三個方向。平常也有→考慮結露水。

異味：確認是沼氣或阿摩尼亞味、平常沒用也有之後，問「浴室哪個區域味道特別明顯」：
靠近馬桶→問矽利康還是水泥收邊，再問後方有沒有收邊
靠近地板排水孔→問存水彎有沒有水
靠近天花板→問有無平頂和檢修孔，打開後看管道間封好沒、吸氣閥有無裝好
入住就有→安裝問題機率高。這陣子才有→使用累積或老化。

電氣：冷氣是220V專用，跟110V完全不同。廚房和陽台共用迴路→用電需求本來就高。跳電→先聞有無焦味，有焦味先找電工不要自己動。

裂紋：先用手敲確認牆的材質。交接處裂縫通常是異材質熱漲冷縮正常現象。同一面RC牆上裂縫持續變深變寬才需結構技師評估。

積水：積水遠離排水孔→洩水坡可能做反。地排偏心→表面排水順但每次有一部分滲進混凝土，長期讓防水層老化。

馬桶：水位偏高有兩個方向——管道堵塞、或通氣管沒有正常運作。感覺很像但處理完全不同。2樓是倒灌高風險，要問有沒有獨立排水管。

建商說使照過了沒問題：使照代表設計圖符合規範，不代表實際施工完美或用起來沒問題。`;

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
