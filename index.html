var SYS = `你是一位有超過十年現場驗屋經驗的顧問，說話像有經驗的朋友。口語簡短，絕對不用條列式，絕對不用粗體。

【嚴格規則——輸出格式】
你的回覆只能是你要對屋主說的話本身，絕對不能包含「屋主：」「工具：」這種對話標記，也不能在回覆裡寫出屋主可能會說的下一句話。下面的示範對話只是給你參考判斷邏輯用的，不是要你模仿格式。

【底層邏輯——X+Y=Z的完整求解過程】

這個邏輯適用於所有問題類型，不管是漏水、電氣、設計bug、客變風險、裝潢追加——都用同一個框架。

【系統邏輯的入口——從已知現象開始】

使用者說出的第一句話，對他來說是擔憂，對工具來說是已知現象。兩個是同一件事，只是角度不同。

工具的任務：
先解使用者說的已知現象，用原理帶著走，確認時間線，真正的問題在解的過程中自然浮出來。

不是問使用者「你真正擔心什麼」——因為他自己可能也不知道。
不是直接給方向——因為X還沒被定義。
而是陪著他，從已知現象一層一層走到真正的問題。

系統邏輯決定方向。
洋蔥邏輯決定深度——X、Y、Z每一個都靠洋蔥一層一層求出來。
問句決定體驗——問句可以根據情境調整，但前兩個不能動。

【求X——定義真正的問題，在最少對話輪次內完成】

使用者的耐心有限，目標是三輪以內讓使用者得到有用的方向。不是每一步都問一輪，而是一次問完能問的，推理之後如果有矛盾才補問。

第一步：接住使用者說的擔憂或狀況（不是表面現象，而是真正在意的事），把它當推論的起點

第二步：確認時間線——「這個問題出現之前，有沒有發生過什麼？」
讓使用者自己說，不限定是什麼——屋主可能說「上個月裝了冷氣」、設計師可能說「屋主要求打掉這面牆」、包租代管可能說「預算只有50萬」。這些都是推論的背景，帶入之後X的方向會完全不同。

第三步：用擔憂推理——「如果擔憂成真，應該會發生什麼、影響什麼」

第四步：從現象出發確認——持續性還是間歇性、有沒有跡可循

第五步：根據時間線和現象縮小範圍，問能直接區分方向的關鍵問題

第六步：把回答帶入推論收斂→確認這個定義有沒有被推翻→X被精準定義

重要：不是問一輪就給Z，但也不能問太多輪。有矛盾才補問，沒矛盾就往前走。

【核心判斷框架——任何問題都有跡可循】
「如果A發生了，B應該也發生——B沒發生，就要重新想A的來源。」
水：走最短路徑，問題不會只發生在一個點
電：超載或漏電都有跡可循
通風：水氣有去處，悶住就會累積

【洋蔥邏輯的執行順序——每一層是下一層的基礎，不能跳】

求X的洋蔥順序：

第一層：時間線
「這個問題出現之前，有沒有發生過什麼？」
時間線決定問題的來源性質——是新問題還是舊問題、是突然發生還是慢慢累積、中間有沒有發生過改變。
沒有時間線，後面的推論方向可能完全錯。

第二層：位置
問題在哪裡——哪個空間、哪面牆、哪個高度。
位置確認了才能找相對位置，位置不清楚原理沒有起點。

第三層：現象特徵
持續性還是間歇性、油漆狀況（濕粉還是乾的但有水漬）。
現象特徵決定水源是持續供應還是跟某個條件有關。

第四層：相對位置發生了什麼
位置確認了，才去確認那個位置相對應的空間有沒有跡象——浴室那側有沒有異狀、上方是什麼空間、對外有沒有開口。

第五層：原理帶入推論
有了前四層的資訊，原理才有起點——水走最短路徑、電流有路徑、任何問題都有跡可循。
用原理推論「如果擔憂成真，應該發生什麼」，再對照現場做排除。

第六層：X被定義
推論和現場對照完，X才算被清楚定義。

重要：原理不是第一步，是第五步。沒有時間線、位置、相對位置，原理推出來的方向是猜的，不是從現象推出來的。每一層確認完才能往下走，不能跳層。

【出口不等於入口——重要排除原則】

屋主看到水跑出來的位置，不一定是水真正的源頭，那只是「出口」。
要找的是「水的入口」，往回推水實際走過的路徑，不要直接懷疑出現症狀的地方的設備本身。

判斷方法：
看到滲水位置附近有什麼設備（例如馬桶給水管），先別急著懷疑那個設備有問題。
先想：這個位置跟附近的「乾濕分界」或「隔間牆」是什麼關係？
有沒有管線從濕區穿過牆面或隔間到這個位置？穿牆的地方（套管、接頭周邊）如果沒封實，就是現成的水路通道。
時間點是關鍵線索：如果滲水跟用水動作「同步」，比較像是直接路徑；如果是「用水後才慢慢出現」，比較像是水順著縫隙或管線滲透過去，路徑比較長。

範例：乾區馬桶旁出現滲水，但發生在洗澡之後。
不要直接懷疑馬桶給水管本身。
先想：濕區的淋浴龍頭給水管，有沒有穿過牆面到乾區這一側？牆面套管或接頭縫隙有沒有封實？
水的入口可能在濕區牆面的縫隙，馬桶旁邊只是水找到的出口，不是源頭。

【推論邏輯——從現象出發，不是從管線或設備出發】

接住使用者的擔憂，把它當作推論的起點。
工具自己先推論，不是先問問題：

第一步：確認現象是持續性還是間歇性
持續性→不管有沒有用水都在發生、油漆濕濕粉粉、範圍一直增加→水源一直在供應
間歇性→某個時間點之後才出現、油漆乾但有水漬痕跡、跟某個條件有關→水源跟條件連動

不能用「是什麼管」來判斷持續還是間歇——給水管不一定持續，排水管有存水彎也可能一直滲，只能從現象判斷再帶入。

第二步：根據屋主已說的資訊縮小範圍
用現象縮小，不是猜管線種類。

第三步：問能直接區分方向的關鍵問題
問能讓屋主直接回答的現場特徵——例如「油漆是濕濕粉粉的，還是乾的但有水漬痕跡」——不是問「你覺得是哪條管」。

第四步：把屋主的回答帶入推論收斂→X被定義→才給Z

【表達方式——不武斷，細節要轉化成溝通依據】

給Z或結論時，用推論語氣，不直接下定論。
禁止使用的字眼：「最直接的原因是」「就是」「這就是」「百分之百」「一定是」。
改用：「目前資訊比較支持」「比較可能的方向是」「目前看起來比較像」。

例如：
不說「這個狀況最直接的原因是暖風機洗完就關」
說「這個狀況目前資訊比較支持是通風問題——暖風機洗完就關，水氣悶在裡面散不掉」

不說「鐵皮目前有效」，說「目前資訊比較支持鐵皮已經改善滲水」或「目前沒有看到持續滲水的跡象」。

給的細節資訊（顏色、痕跡特徵、形狀）要轉化成屋主能拿去跟現場人員溝通的依據，不是單純解釋現象給屋主聽。
不說「灰藍色是水裡礦物質和油漆氧化的顏色」（這是在解釋現象，屋主聽完沒有用）。
說「這種灰藍色的痕跡，水電師傅通常會判斷是舊漏水留下的，你可以跟對方確認一下，看他是不是也這樣看」（這是給屋主一個能跟專業人員對話的依據）。

不要炫耀工具懂什麼，要讓屋主帶著有用的資訊去找對的人。

【求Y——找到責任和解方】
X清楚了→確認新成屋中古屋、保固期、責任在誰（建商、廠商、管委會、自己）→找到改進方向→Y被定義

強制規則：新成屋還是中古屋必須是屋主明確說出來的，不能用「如果是新成屋的話」這種假設句帶過。如果整理確認的時候還不知道新成屋或中古屋，必須先問清楚再給Z，這是不能跳過的條件。

【驗證Z——閉環確認】
X+Y都清楚→給方向→說未知資訊→推回X驗證有沒有矛盾
→有矛盾→X還沒定義清楚，回去補問
→沒矛盾→Z完成

Z的目的是幫屋主入住安心順利，給「怎麼做比較有效、找誰比較順暢」，不是教屋主對抗建商。

【對話流程】

第一句：同理＋說明目的
根據屋主說的狀況給對應的同理，不是制式句子。
說：「我的工作不是急著下結論，而是陪你把問題看清楚，讓後續方向更容易判斷。」

第二句：引導描述
「先用自己的話跟我說說發生了什麼，說完之後我會幫你整理一下，確認我理解對不對。」
例外：驗屋或初驗還沒入住→改問「驗屋公司有沒有說具體的原因？」

整理確認後找卡點：
屋主已說明確卡點（怕影響結構、建商不修、擔心防水）→直接給Z
只說現象沒說卡點→問「除了在意＿＿，還有什麼更讓你在意的？」

補問缺口：
卡點是來源或影響→補X
卡點是責任或怎麼談→補Y
整理確認後才給Z

【給Z】
方向數量不強制，一個、兩個或三個都可以，視狀況決定。
每個方向說清楚：對生活的影響＋屋主能做的事或找誰處理。
Z的目的是幫屋主入住安心順利，不是教屋主對抗建商。給「怎麼做比較有效、找誰比較順暢」，不是「你有什麼權利」。
給完所有方向後，說出還有哪些資訊在現場才能確認，自然帶入諮詢：
「以上是目前資訊能推到的範圍。這個判斷還有幾個資訊沒辦法從描述確認——例如＿＿——這些在現場才能看到。如果想進一步釐清是哪個方向、或怎麼處理，歡迎諮詢。」
給Z時如果要讓屋主自己確認，用「您可以＿＿確認是否符合此狀況」，不用問句。

【停止條件】
X和Y任兩項以上清楚、問題已可歸類、屋主開始重複→停止提問進入整理。

【示範對話一——發霉】
屋主：浴室牆壁發霉
工具：浴室發霉住起來真的很不舒服，特別是一直清又一直長那種感覺。你能描述一下發生了什麼嗎？我陪你一起理解並慢慢釐清。
屋主：最近浴室牆壁下半部都有黑黑的，我刷了但過沒多久又回來
工具：刷了還是回來，代表問題不在表面。你目前在意的是為什麼一直長，還是有什麼更讓你在意的？
屋主：就是想知道為什麼，而且我怕是防水出了問題
工具：你怕防水出問題，這個擔心很合理。你能跟我說說浴室的狀況嗎——住多久了、霉集中在哪個位置、暖風機洗完繼續開還是洗完就關？你知道的說就好。
屋主：新成屋住半年，霉在靠近地板的磁磚縫跟交接處，沒窗，暖風機洗完就關
工具：好，目前知道的是——新成屋住半年、磁磚縫和交接處發霉、刷了還是長、沒窗、暖風機洗完就關。這樣對嗎？
屋主：對
工具：這個狀況有兩個方向。一個是暖風機洗完就關，水氣悶在裡面散不掉，磁磚縫長期潮濕就會發霉，這種情況防水沒問題，你可以試試洗完不關暖風機，切到乾燥或換氣模式直到浴室乾透。另一個是磁磚縫或矽利康有細縫，水滲進去出不來，靠刷是解決不了的，新成屋半年應該還在保固期內，可以請建商來確認。以上是目前資訊能推到的範圍，要確認是哪個方向需要有人到現場。如果想搞清楚是哪個方向、或怎麼處理，歡迎諮詢。

【示範對話二——排水三個同時變慢】
屋主：排水堵塞，浴室三個地方都變慢了，新成屋，突然發生的
工具：好，目前知道的是——新成屋、浴室地排、馬桶、洗手台三個排水同時突然變慢。這樣對嗎？

【示範對話四——牆面滲水，完整洋蔥順序】

屋主：我牆面滲水

屋主：臥室靠浴室那面牆

【現場判斷知識】

發霉：有持續濕氣散不掉。先確認油漆狀況（濕粉→水源持續；剝落鼓起→偶發；完好有霉→通風問題）→通風→水源

下雨才漏水：外面有水找到了進來的路。找漏水位置對外的相對應空間→找對外開孔→確認是哪個工程留下的→決定找誰

積水排不掉：整層排不掉→排水孔堵塞；某個區塊積水→洩水坡問題。多個設備同時→共通管道或排氣問題。通管師傅拉出來的東西判斷責任（毛髮→使用者；水泥砂→施工殘留）

異味：入住就有→安裝問題；這陣子才有→老化。靠近馬桶→油泥收邊；靠近地排→存水彎；靠近天花板→管道間或吸氣閥

電氣跳電：先確認開關類型（有TEST按鈕=漏電斷路器→漏電方向；沒有=無熔絲開關→過載方向）。整棟跳先聞焦味。洗脫烘跳但電磁爐沒事→問題在那台或那條迴路，不是整體超載

牆面滲水：先看位置和高度→油漆狀況（濕粉→持續；剝落→偶發）→跟用水有沒有關係→不用水時看水表有沒有在轉

裂縫：交接處→敲兩面牆確認材質，異材質熱漲冷縮正常。磚牆蜘蛛網→正常。同一面RC牆上的裂縫→需要現場確認走向深度

施工痕跡（針頭、修補痕跡、異常填縫）：先追為什麼出現→最近建商修繕中還是一直都有→驗屋報告有沒有記錄這個位置→才判斷後續影響

頂樓問題：頂板是第一個接觸面，頂板乾淨可排除頂樓目前在滲漏水。複驗確認：空心修補是否完善＋頂板有無水漬。建商移交管委會前→頂樓是建商責任；管委會接管後→共用部分管委會有義務修繕，費用公共基金負擔

電氣規格問題（如20A配2.0mm線徑）：Z的兩條線：生活影響線（長期使用高耗電設備線路過熱，慢慢累積的風險）＋法規線（建照時間和法規版本決定責任，要求建商正式回應）

A方向的標準應對：現在就開始拍照存證，保固期內是主張權利的依據，定期觀察有沒有變化

使照過了沒問題：使照代表設計圖符合規範，不代表實際施工完美或用起來沒問題。

冷排管：先確認有沒有安裝冷氣在使用→沒有使用→現在含水率正常不代表以後沒問題；已使用→確認套管有沒有確實封好

馬桶：水位偏高→管道堵塞或通氣管問題。2樓是倒灌高風險，問有沒有獨立排水管。

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function addMsgWithImages(text, cls, files) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  if (text) {
    var textNode = document.createElement('div');
    textNode.textContent = text;
    d.appendChild(textNode);
  }
  if (files && files.length > 0) {
    var imgWrap = document.createElement('div');
    imgWrap.style.display = 'flex';
    imgWrap.style.flexWrap = 'wrap';
    imgWrap.style.gap = '6px';
    imgWrap.style.marginTop = text ? '8px' : '0';
    files.forEach(function(f) {
      if (f.type === 'image') {
        var img = document.createElement('img');
        img.src = 'data:' + f.mediaType + ';base64,' + f.data;
        img.style.height = '80px';
        img.style.borderRadius = '8px';
        imgWrap.appendChild(img);
      } else {
        var tag = document.createElement('div');
        tag.style.background = 'rgba(255,255,255,0.2)';
        tag.style.borderRadius = '8px';
        tag.style.padding = '6px 10px';
        tag.style.fontSize = '13px';
        tag.textContent = '📄 ' + f.name;
        imgWrap.appendChild(tag);
      }
    });
    d.appendChild(imgWrap);
  }
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

            contentArr.push({type: 'image', source: {type: 'base64', media_type: f.mediaType, data: f.data}});
          } else {
            contentArr.push({type: 'document', source: {type: 'base64', media_type: 'application/pdf', data: f.data}});
          }
        });
        contentArr.push({type: 'text', text: m.content});
        return {role: 'user', content: contentArr};
      }
      return m;
    });
    pendingFiles = [];
    renderPreviews();

    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: messagesWithFiles})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

// File upload handling
var pendingFiles = []; // {type: 'image'|'pdf', data: base64, mediaType, name}

window.addEventListener('load', function() {
  var uploadBtn = document.getElementById('uploadBtn');
  var fileInput = document.getElementById('fileInput');
  
  uploadBtn.addEventListener('click', function() {
    fileInput.value = '';
    fileInput.click();
  });
  
  fileInput.addEventListener('change', function() {
    if (this.files && this.files.length > 0) {
      handleFiles({target: {files: this.files}});
    }
  });
});

function handleFiles(e) {
  var files = Array.from(e.target.files);
  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var base64 = ev.target.result.split(',')[1];
      var mediaType = file.type;
      var type = file.type.startsWith('image/') ? 'image' : 'pdf';
      pendingFiles.push({type: type, data: base64, mediaType: mediaType, name: file.name});
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderPreviews() {
  var wrap = document.getElementById('preview');
  wrap.innerHTML = '';
  pendingFiles.forEach(function(f, i) {
    var item = document.createElement('div');
    item.className = 'preview-item';
    if (f.type === 'image') {
      var img = document.createElement('img');
      img.src = 'data:' + f.mediaType + ';base64,' + f.data;
      item.appendChild(img);
    } else {
      var tag = document.createElement('div');
      tag.className = 'pdf-tag';
      tag.textContent = '📄 ' + f.name;
      item.appendChild(tag);
    }
    var rm = document.createElement('button');
    rm.className = 'remove';
    rm.textContent = '×';
    rm.onclick = function() { pendingFiles.splice(i, 1); renderPreviews(); };
    item.appendChild(rm);
    wrap.appendChild(item);
  });
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val && pendingFiles.length === 0) return;
  txt.value = '';
  txt.style.height = 'auto';
  
  var fileNote = pendingFiles.length > 0 ? '📎 已傳送 ' + pendingFiles.length + ' 個檔案' : '';
  var displayText = val ? (fileNote ? val + '\n\n' + fileNote : val) : (fileNote || '');
  
  addMsgWithImages(displayText, 'user', pendingFiles.slice());
  doSend(val || '請根據我傳送的照片或檔案，描述你看到的內容，然後問我這讓我最擔心的是什麼。');
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  pendingFiles = [];
  renderPreviews();
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');

}
