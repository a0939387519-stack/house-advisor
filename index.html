<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的房子，我幫你想清楚</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 14px 18px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 100px;
}
.msg {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.ai {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.user {
  background: #1a1a1a;
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.thinking {
  background: #fff;
  border: 1px solid #eee;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #aaa;
  font-size: 14px;
}
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #eee;
  padding: 10px 14px 14px;
}
.row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 680px;
  margin: 0 auto;
}
textarea {
  flex: 1;
  padding: 9px 13px;
  border: 1px solid #ddd;
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  background: #f8f8f6;
  max-height: 100px;
  outline: none;
}
textarea:focus { border-color: #aaa; background: #fff; }
button#btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
button#btn:disabled { background: #ccc; cursor: not-allowed; }
.restart { text-align: center; margin-top: 6px; }
.restart button {
  font-size: 12px;
  color: #aaa;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
}
.consult {
  background: #fff8f0;
  border: 1px solid #f0d9b5;
  border-radius: 16px;
  padding: 13px 15px;
  font-size: 14px;
  color: #7a5c2e;
  line-height: 1.6;
  max-width: 82%;
  align-self: flex-start;
}
.consult a { color: #7a5c2e; font-weight: 600; display: block; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>你的房子，我幫你想清楚</h1>
  <p>說說你遇到的狀況，我一步一步幫你想清楚</p>
</div>
<div id="chat"></div>
<div class="bottom">
  <div class="row">
    <textarea id="txt" rows="1" placeholder="說說你遇到的狀況…"></textarea>
    <button id="btn">↑</button>
  </div>
  <div class="restart"><button onclick="restart()">重新開始</button></div>
</div>

<script>
var API = 'https://house-advisor-nine.vercel.app/api/chat';
var SYS = '你是一位有超過十年現場驗屋經驗的顧問。說話像有經驗的朋友，不是客服或法律顧問。\n\n【你唯一的身份】\n技術判斷者。不是法規仲裁者，不是談判顧問。\n你的工作分三個階段：\n第一階段：收斂問題，確認關鍵事實\n第二階段：釐清雙方立場，整理衝突點\n第三階段：用生活場景讓屋主自己判斷，然後給一句屋主可以直接說的話\n\n不要跳過第一、二階段直接給第三階段。\n\n【回應長度限制】\n每次回應控制在120字以內。說一件事，問一個問題。不要一次說太多。\n\n【最重要的規則】\n1. 問題的主體不能跑掉。屋主說陽台，就追陽台到底。說天花板就追天花板。不要跑到其他空間。\n2. 不要找答案，要排除可能性。\n3. 資訊不足就繼續問，不要猜。\n4. 不確定時給觀察方向，不給結論。\n5. 每次只問一個問題，口語簡短。\n6. 不用條列式和粗體，像朋友說話。\n7. 不要說「這超出我的範圍」，要說「這個需要更深入討論，可以找我諮詢」。\n\n【當建商和驗屋公司立場衝突時】\n第一步：先收斂技術事實，不站任何一邊\n第二步：確認屋主的實際使用狀況\n第三步：確認問題後，用生活場景說明影響。不說法規，說跳電的那個早晨、那個臭味、那個潮濕。讓屋主自己說「這我不能接受」\n第四步：給屋主一句可以直接問建商的話，簡單、直接，不需要背法規\n例如：「您可以問建商：我照正常生活方式使用，如果一直這樣發生，你們後續怎麼處理？」\n\n【電氣迴路問題的追問邏輯】\n第一步：確認是獨立迴路還是共用\n第二步：共用的話，跟哪裡接在一起（廚房？客廳？衛浴？）這決定一切判斷\n廚房→兩個都是高耗電區域，同時使用容易過載，這是問題\n客廳→要看實際負載，不一定有問題\n衛浴→法規規定21.1坪以下可共用，只要20A就合規，建商可能站得住腳\n第三步：確認要用什麼電器\n第四步：從生活影響說明風險，法規是最後才用的\n\n【天花板水漬】\n第一步：有沒有平頂天花板裝潢\n第二步：新成屋還是中古屋\n第三步：樓上相對位置有沒有用水空間\n不急著說防水層，不在不知道屋齡的情況下提保固。\n\n【濕區滲到乾區】\n用水時才滲→設備周邊填縫問題\n持續滲→才考慮防水層\n\n【發霉】\n先問發霉的具體位置，再問通風習慣，不急著說濾網。\n\n【積水】\n一定要問使用習慣，再判斷是施工還是使用習慣問題。\n\n【裂紋】\n一定要先問牆的材質，交接處裂紋通常是異材質正常現象，但要先確認材質。\n\n【馬桶有穢物】\n第一問幾樓，第二問有無獨立排水管，第三問沖水順不順。\n\n【異音】\n先確認位置和出現時機，資訊不足給觀察方向，不直接說原因。\n\n【跳電】\n先確認整棟還是某迴路，再確認什麼情況下跳。\n給方向時必須加安全提示：先聞有沒有焦味，有焦味先找電工，看電箱前先關開關。\n\n【屋主焦慮但自家沒問題】\n提醒保固期內的權利，問鄰居說的問題在哪裡，給觀察方向。\n\n【屋主已交屋對驗屋有疑慮】\n不要再問買沒買，直接幫屋主從擔心變成知道怎麼辦。\n說明保固權利、觀察方式、發生時的處理方向。\n靠窗或靠外牆的家具建議不要封死，保留觀察空間。\n\n【建議諮詢的時機】\n涉及結構安全、建商不肯修、問題複雜需現場確認、談判策略需深入討論。\n說完後加：如果需要更具體的協助，可以找我諮詢。\n\n記住：先收斂問題，確認事實，最後才用生活場景幫屋主知道怎麼說。每次回應120字以內。';

var hist = [];
var busy = false;
var count = 0;
var consultShown = false;

function addMsg(text, cls) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
  return d;
}

function showThink(on) {
  busy = on;
  document.getElementById('btn').disabled = on;
  var el = document.getElementById('think');
  if (on && !el) {
    var d = document.createElement('div');
    d.className = 'msg thinking';
    d.id = 'think';
    d.textContent = '想一下…';
    document.getElementById('chat').appendChild(d);
    d.scrollIntoView({behavior:'smooth', block:'end'});
  } else if (!on && el) {
    el.remove();
  }
}

function showConsult() {
  if (consultShown) return;
  consultShown = true;
  var d = document.createElement('div');
  d.className = 'consult';
  d.innerHTML = '如果想更確認問題的真實狀況，或需要具體的溝通方式，歡迎進一步諮詢。<a href="https://www.threads.net/@swan.3175031" target="_blank">前往諮詢 →</a>';
  document.getElementById('chat').appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

async function doSend(text) {
  hist.push({role:'user', content:text});
  showThink(true);
  try {
    var r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({system: SYS, messages: hist})
    });
    var data = await r.json();
    showThink(false);
    if (data.text) {
      hist.push({role:'assistant', content:data.text});
      addMsg(data.text, 'ai');
      count++;
      if (count >= 9 && !consultShown) showConsult();
    } else {
      addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
    }
  } catch(e) {
    showThink(false);
    addMsg('抱歉，連線有點問題，請再試一次。', 'ai');
  }
}

function send() {
  if (busy) return;
  var txt = document.getElementById('txt');
  var val = txt.value.trim();
  if (!val) return;
  txt.value = '';
  txt.style.height = 'auto';
  addMsg(val, 'user');
  doSend(val);
}

document.getElementById('btn').onclick = send;
document.getElementById('txt').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('txt').oninput = function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
};

function restart() {
  hist = [];
  count = 0;
  busy = false;
  consultShown = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('chat').innerHTML = '';
  addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
}

addMsg('你好，說說你遇到什麼狀況？不用專業術語，就說你看到或感受到的是什麼。', 'ai');
</script>
</body>
</html>
